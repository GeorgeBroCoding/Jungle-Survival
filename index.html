// ============================================================
// Animals.js - wandering/fleeing wildlife
// ============================================================
const WANDER_RADIUS = 14;
const FLEE_RANGE = 7;

function useWanderAI(group, spawn, {
  speed = 1.6, fleeSpeed = 5, entityId = null, registryKey = 'animals',
  aggressive = false, aggroRange = FLEE_RANGE, attackRange = 1.8,
  attackSpeed = 0, attackDamage = 0, attackCooldown = 1.2,
  frozen = false, alertTribeId = null,
}) {
  const { camera } = useThree();
  const state = useRef('idle');
  const timer = useRef(1 + Math.random() * 3);
  const target = useRef(new THREE.Vector3(spawn[0], 0, spawn[2]));
  const phase = useRef(Math.random() * 10);
  const legRefs = useRef([]);
  const attackTimer = useRef(0);
  const warnedAttack = useRef(false);

  useEffect(() => {
    return () => {
      if (entityId) {
        delete entityRegistry[registryKey][entityId];
        if (registryKey === 'tribeMembers') delete tribeMemberSyncData[entityId];
      }
    };
  }, [entityId, registryKey]);

  useFrame((_, rawDelta) => {
    const delta = Math.min(rawDelta, 0.1);
    if (!group.current) return;
    if (frozen) return; // position is driven by the multiplayer host instead
    const pos = group.current.position;
    if (entityId) {
      entityRegistry[registryKey][entityId] = pos;
      if (registryKey === 'tribeMembers' && useGame.getState().mpRole === 'host') {
        tribeMemberSyncData[entityId] = { position: [pos.x, pos.y, pos.z], yaw: group.current.rotation.y };
      }
    }
    timer.current -= delta;
    attackTimer.current -= delta;

    const dx = pos.x - camera.position.x;
    const dz = pos.z - camera.position.z;
    const distToPlayer = Math.hypot(dx, dz);

    // A camp-mate being attacked alerts the whole camp - they rush in from much further away.
    const alertedUntil = alertTribeId ? useGame.getState().alertedCamps[alertTribeId] : 0;
    const effectiveAggroRange = alertedUntil && alertedUntil > Date.now() ? Math.max(aggroRange, CAMP_ALERT_RANGE) : aggroRange;

    if (aggressive && distToPlayer < effectiveAggroRange) {
      state.current = 'attack';
    } else if (!aggressive && distToPlayer < FLEE_RANGE) {
      state.current = 'flee';
    } else if (state.current === 'attack') {
      // lost the player - give up the chase and wander again
      state.current = 'idle';
      timer.current = 1;
      warnedAttack.current = false;
    } else if (timer.current <= 0) {
      state.current = state.current === 'wander' ? 'idle' : 'wander';
      if (state.current === 'wander') {
        const angle = Math.random() * Math.PI * 2;
        const dist = 4 + Math.random() * 8;
        let tx = pos.x + Math.cos(angle) * dist;
        let tz = pos.z + Math.sin(angle) * dist;
        // keep near spawn
        if (Math.hypot(tx - spawn[0], tz - spawn[2]) > WANDER_RADIUS) {
          tx = spawn[0];
          tz = spawn[2];
        }
        target.current.set(tx, 0, tz);
        timer.current = 3 + Math.random() * 4;
      } else {
        timer.current = 1.5 + Math.random() * 3;
      }
    }

    let dirX = 0, dirZ = 0, speedNow = 0;
    if (state.current === 'attack') {
      const len = Math.hypot(dx, dz) || 1;
      if (distToPlayer > attackRange) {
        dirX = -dx / len;
        dirZ = -dz / len;
        speedNow = attackSpeed || speed;
      } else {
        group.current.rotation.y = Math.atan2(-dx / len, -dz / len);
        if (!warnedAttack.current) {
          useGame.getState().addToast('A rival tribesperson attacks you!');
          warnedAttack.current = true;
        }
        if (attackTimer.current <= 0 && attackDamage > 0) {
          useGame.getState().adjustStat('health', -attackDamage);
          attackTimer.current = attackCooldown;
        }
      }
    } else if (state.current === 'flee') {
      const len = Math.hypot(dx, dz) || 1;
      dirX = dx / len;
      dirZ = dz / len;
      speedNow = fleeSpeed;
      if (distToPlayer > FLEE_RANGE * 1.6) {
        state.current = 'idle';
        timer.current = 1;
      }
    } else if (state.current === 'wander') {
      const tx = target.current.x - pos.x;
      const tz = target.current.z - pos.z;
      const d = Math.hypot(tx, tz);
      if (d < 0.3) {
        state.current = 'idle';
        timer.current = 1.5 + Math.random() * 3;
      } else {
        dirX = tx / d;
        dirZ = tz / d;
        speedNow = speed;
      }
    }

    if (speedNow > 0) {
      pos.x += dirX * speedNow * delta;
      pos.z += dirZ * speedNow * delta;
      group.current.rotation.y = Math.atan2(dirX, dirZ);
      phase.current += delta * speedNow * 3;
      const swing = Math.sin(phase.current) * 0.4;
      for (const leg of legRefs.current) {
        if (leg.ref.current) leg.ref.current.rotation.x = leg.sign * swing;
      }
    } else {
      for (const leg of legRefs.current) {
        if (leg.ref.current) leg.ref.current.rotation.x *= 0.9;
      }
    }
    pos.y = getTerrainHeight(pos.x, pos.z);
  });

  return legRefs;
}

// ---------- Hostile tribe member: wanders near its camp, attacks if the player gets close ----------
function TribeMember({ id, spawn, color }) {
  const alive = useGame((s) => s.tribeMemberState[id]?.alive ?? true);
  const isJoiner = useGame((s) => s.mpRole === 'joiner');
  const group = useRef();
  const legL = useRef();
  const legR = useRef();
  const netPhase = useRef(Math.random() * 10);
  const legRefs = useWanderAI(group, spawn, {
    speed: 1.2, fleeSpeed: 3, entityId: (!isJoiner && alive) ? id : null, registryKey: 'tribeMembers',
    aggressive: true, aggroRange: TRIBE_MEMBER_AGGRO_RANGE, attackRange: TRIBE_MEMBER_ATTACK_RANGE,
    attackSpeed: TRIBE_MEMBER_ATTACK_SPEED, attackDamage: TRIBE_MEMBER_DAMAGE, attackCooldown: TRIBE_MEMBER_ATTACK_COOLDOWN,
    frozen: isJoiner, alertTribeId: id.split('_m')[0],
  });

  // Joiner: this member's position/rotation is driven by the host's tribeSync
  // broadcast instead of local wander AI.
  useFrame((_, rawDelta) => {
    if (!isJoiner || !group.current) return;
    const net = remoteTribeMembers[id];
    if (!net) return;
    const delta = Math.min(rawDelta, 0.1);
    const g = group.current;
    const dx = net.position[0] - g.position.x;
    const dz = net.position[2] - g.position.z;
    g.position.x += dx * 0.25;
    g.position.y += (net.position[1] - g.position.y) * 0.25;
    g.position.z += dz * 0.25;
    let yawDiff = net.yaw - g.rotation.y;
    while (yawDiff > Math.PI) yawDiff -= Math.PI * 2;
    while (yawDiff < -Math.PI) yawDiff += Math.PI * 2;
    g.rotation.y += yawDiff * 0.25;
    entityRegistry.tribeMembers[id] = g.position;

    if (Math.hypot(dx, dz) > 0.05) {
      netPhase.current += delta * 4;
      const swing = Math.sin(netPhase.current) * 0.4;
      for (const leg of legRefs.current) if (leg.ref.current) leg.ref.current.rotation.x = leg.sign * swing;
    } else {
      for (const leg of legRefs.current) if (leg.ref.current) leg.ref.current.rotation.x *= 0.9;
    }
  });

  useEffect(() => {
    if (!isJoiner) return undefined;
    return () => { delete entityRegistry.tribeMembers[id]; };
  }, [id, isJoiner]);

  if (!alive) return null;
  legRefs.current = [
    { ref: legL, sign: 1 },
    { ref: legR, sign: -1 },
  ];

  return html`
    <group ref=${group} position=${spawn}>
      <${TribalFigure} color=${color} />
      <group ref=${legL} position=${[0.12, 0.55, 0]}>
        <mesh position=${[0, -0.3, 0]} castShadow=${true}><capsuleGeometry args=${[0.09, 0.5, 4, 6]} /><meshStandardMaterial color="#5a4632" /></mesh>
      </group>
      <group ref=${legR} position=${[-0.12, 0.55, 0]}>
        <mesh position=${[0, -0.3, 0]} castShadow=${true}><capsuleGeometry args=${[0.09, 0.5, 4, 6]} /><meshStandardMaterial color="#5a4632" /></mesh>
      </group>
    </group>
  `;
}

  const timer = useRef(TRIBE_SPAWN_INTERVAL);
  useFrame((_, rawDelta) => {

    const s = useGame.getState();
    if (s.mpRole === 'joiner') return;

// ---------- Loose idle/wander AI for friendly warriors guarding the base ----------
function useGuardWander(group, spawn, speed = 1) {
  const state = useRef('idle');
  const timer = useRef(1 + Math.random() * 3);
  const target = useRef(new THREE.Vector3(spawn[0], 0, spawn[2]));
  const phase = useRef(Math.random() * 10);
  const legRefs = useRef([]);

  useFrame((_, rawDelta) => {
    const delta = Math.min(rawDelta, 0.1);
    if (!group.current) return;
    const pos = group.current.position;
    timer.current -= delta;

    if (timer.current <= 0) {
      state.current = state.current === 'wander' ? 'idle' : 'wander';
      if (state.current === 'wander') {
        const angle = Math.random() * Math.PI * 2;
        const dist = 2 + Math.random() * 4;
        target.current.set(spawn[0] + Math.cos(angle) * dist, 0, spawn[2] + Math.sin(angle) * dist);
        timer.current = 3 + Math.random() * 4;
      } else {
        timer.current = 2 + Math.random() * 3;
      }
    }

    let dirX = 0, dirZ = 0, speedNow = 0;
    if (state.current === 'wander') {
      const tx = target.current.x - pos.x;
      const tz = target.current.z - pos.z;
      const d = Math.hypot(tx, tz);
      if (d < 0.3) {
        state.current = 'idle';
        timer.current = 2 + Math.random() * 3;
      } else {
        dirX = tx / d;
        dirZ = tz / d;
        speedNow = speed;
      }
    }

    if (speedNow > 0) {
      pos.x += dirX * speedNow * delta;
      pos.z += dirZ * speedNow * delta;
      group.current.rotation.y = Math.atan2(dirX, dirZ);
      phase.current += delta * speedNow * 3;
      const swing = Math.sin(phase.current) * 0.4;
      for (const leg of legRefs.current) {
        if (leg.ref.current) leg.ref.current.rotation.x = leg.sign * swing;
      }
    } else {
      for (const leg of legRefs.current) {
        if (leg.ref.current) leg.ref.current.rotation.x *= 0.9;
      }
    }
    pos.y = getTerrainHeight(pos.x, pos.z);
  });

  return legRefs;
}

// ---------- An escort warrior: follows the player and fights rival tribe members/raiders ----------
function useEscortAI(group, index) {
  const legRefs = useRef([]);
  const phase = useRef(Math.random() * 10);
  const attackTimer = useRef(Math.random() * ESCORT_ATTACK_COOLDOWN);

  useFrame((_, rawDelta) => {
    const delta = Math.min(rawDelta, 0.1);
    if (!group.current) return;
    const pos = group.current.position;
    attackTimer.current -= delta;

    const s = useGame.getState();
    const [px, , pz] = playerTransform.position;
    const yaw = playerTransform.yaw;

    // Look for the nearest rival tribe member or raider to fight.
    let target = null;
    let bestDist = ESCORT_AGGRO_RANGE;
    for (const [id, p] of Object.entries(entityRegistry.tribeMembers)) {
      if (!s.tribeMemberState[id]?.alive) continue;
      const d = Math.hypot(p.x - pos.x, p.z - pos.z);
      if (d < bestDist) { bestDist = d; target = { kind: 'tribeMember', id, pos: p }; }
    }
    if (s.raid) {
      for (const r of s.raid.raiders) {
        const p = entityRegistry.raiders[r.id];
        if (!p) continue;
        const d = Math.hypot(p.x - pos.x, p.z - pos.z);
        if (d < bestDist) { bestDist = d; target = { kind: 'raider', id: r.id, pos: p }; }
      }
    }
    if (s.distantRaid) {
      for (const r of s.distantRaid.raiders) {
        const p = entityRegistry.distantRaiders[r.id];
        if (!p) continue;
        const d = Math.hypot(p.x - pos.x, p.z - pos.z);
        if (d < bestDist) { bestDist = d; target = { kind: 'distantRaider', id: r.id, pos: p }; }
      }
    }
    if (s.interTribalRaid) {
      for (const r of s.interTribalRaid.raiders) {
        const p = entityRegistry.interTribalRaiders[r.id];
        if (!p) continue;
        const d = Math.hypot(p.x - pos.x, p.z - pos.z);
        if (d < bestDist) { bestDist = d; target = { kind: 'interTribalRaider', id: r.id, pos: p }; }
      }
    }

    let tx, tz;
    if (target) {
      tx = target.pos.x;
      tz = target.pos.z;
    } else {
      // Hold a formation slot just behind and to the side of the player.
      const side = index % 2 === 0 ? 1 : -1;
      const spread = 0.6 + Math.floor(index / 2) * 0.45;
      const angle = yaw + Math.PI + side * spread;
      tx = px + Math.sin(angle) * ESCORT_FOLLOW_DIST;
      tz = pz + Math.cos(angle) * ESCORT_FOLLOW_DIST;
    }

    const dx = tx - pos.x;
    const dz = tz - pos.z;
    const dist = Math.hypot(dx, dz);

    if (target && dist < ESCORT_ATTACK_RANGE) {
      group.current.rotation.y = Math.atan2(dx, dz);
      if (attackTimer.current <= 0) {
        attackTimer.current = ESCORT_ATTACK_COOLDOWN;
        if (target.kind === 'tribeMember') {
          if (s.mpRole === 'joiner') mpSend({ t: 'tribeDamage', id: target.id, dmg: ESCORT_ATTACK_DAMAGE });
          else s.damageTribeMember(target.id, ESCORT_ATTACK_DAMAGE);
        } else if (target.kind === 'distantRaider') {
          s.damageDistantRaider(target.id, ESCORT_ATTACK_DAMAGE);
        } else if (target.kind === 'interTribalRaider') {
          s.damageInterTribalRaider(target.id, ESCORT_ATTACK_DAMAGE);
        } else {
          s.damageRaider(target.id, ESCORT_ATTACK_DAMAGE);
        }
      }
    } else if (dist > 0.3) {
      const spd = target ? ESCORT_SPEED : ESCORT_SPEED * 0.7;
      pos.x += (dx / dist) * spd * delta;
      pos.z += (dz / dist) * spd * delta;
      group.current.rotation.y = Math.atan2(dx, dz);
      phase.current += delta * spd * 1.5;
      const swing = Math.sin(phase.current) * 0.4;
      for (const leg of legRefs.current) if (leg.ref.current) leg.ref.current.rotation.x = leg.sign * swing;
    } else {
      for (const leg of legRefs.current) if (leg.ref.current) leg.ref.current.rotation.x *= 0.9;
    }
    pos.y = getTerrainHeight(pos.x, pos.z);
  });

  return legRefs;
}

function EscortWarrior({ index }) {
  const group = useRef();

// ---------- A raider marching from its tribe's camp toward a target (home base or team camp) ----------
function Raider({ id, startPosition, color, targetPos = BASE_CENTER, targetTribeId = null }) {
  const group = useRef();
  const legL = useRef();
  const legR = useRef();
  const phase = useRef(Math.random() * 10);
  const resolved = useRef(false);

  useEffect(() => {
    return () => { delete entityRegistry.raiders[id]; };
  }, [id]);

  useFrame((_, rawDelta) => {
    if (resolved.current || !group.current) return;
    const delta = Math.min(rawDelta, 0.1);
    const pos = group.current.position;
    entityRegistry.raiders[id] = pos;

    let targetX, targetZ;
    if (targetTribeId) {
      targetX = targetPos[0];
      targetZ = targetPos[2];
    } else {
      const warriors = useGame.getState().warriors;
      const guardCount = Math.min(warriors, PLAYER_WARRIOR_SPAWNS.length);
      targetX = BASE_CENTER[0];
      targetZ = BASE_CENTER[2];
      if (guardCount > 0) {
        let bestDist = Infinity;
        for (let i = 0; i < guardCount; i++) {
          const [gx, , gz] = PLAYER_WARRIOR_SPAWNS[i];
          const d = Math.hypot(gx - pos.x, gz - pos.z);
          if (d < bestDist) { bestDist = d; targetX = gx; targetZ = gz; }
        }
      }
    }

    const dx = targetX - pos.x;
    const dz = targetZ - pos.z;
    const dist = Math.hypot(dx, dz);

    if (dist < 2) {
      resolved.current = true;
      if (targetTribeId) {
        useGame.getState().resolveRaider(id, true);
      } else {
        const warriors = useGame.getState().warriors;
        const winChance = Math.min(0.9, warriors * 0.22 + 0.08);
        useGame.getState().resolveRaider(id, Math.random() >= winChance);
      }
      return;
    }

    const speed = 3;
    const dirX = dx / dist;
    const dirZ = dz / dist;
    pos.x += dirX * speed * delta;
    pos.z += dirZ * speed * delta;
    pos.y = getTerrainHeight(pos.x, pos.z);
    group.current.rotation.y = Math.atan2(dirX, dirZ);
    phase.current += delta * speed * 3;
    const swing = Math.sin(phase.current) * 0.4;
    if (legL.current) legL.current.rotation.x = swing;
    if (legR.current) legR.current.rotation.x = -swing;
  });

  return html`
    <group ref=${group} position=${startPosition}>
      <${TribalFigure} color=${color} />
      <group ref=${legL} position=${[0.12, 0.55, 0]}>
        <mesh position=${[0, -0.3, 0]} castShadow=${true}><capsuleGeometry args=${[0.09, 0.5, 4, 6]} /><meshStandardMaterial color="#3a2a1c" /></mesh>

// ---------- A raider from a distant tribe marching toward a specific target location ----------
function DistantRaider({ id, startPosition, color, targetPos }) {
  const group = useRef();
  const legL = useRef();
  const legR = useRef();
  const phase = useRef(Math.random() * 10);
  const resolved = useRef(false);

  useEffect(() => {
    return () => { delete entityRegistry.distantRaiders[id]; };
  }, [id]);

  useFrame((_, rawDelta) => {
    if (resolved.current || !group.current) return;
    const delta = Math.min(rawDelta, 0.1);
    const pos = group.current.position;
    entityRegistry.distantRaiders[id] = pos;

    const dx = targetPos[0] - pos.x;
    const dz = targetPos[2] - pos.z;
    const dist = Math.hypot(dx, dz);

    if (dist < 2.5) {
      resolved.current = true;
      useGame.getState().resolveDistantRaider(id, true);
      return;
    }

    const speed = 3.2;
    pos.x += (dx / dist) * speed * delta;
    pos.z += (dz / dist) * speed * delta;
    pos.y = getTerrainHeight(pos.x, pos.z);
    group.current.rotation.y = Math.atan2(dx, dz);
    phase.current += delta * speed * 3;
    const swing = Math.sin(phase.current) * 0.4;
    if (legL.current) legL.current.rotation.x = swing;
    if (legR.current) legR.current.rotation.x = -swing;
  });

  return html`
    <group ref=${group} position=${startPosition}>
      <${TribalFigure} color=${color} />
      <group ref=${legL} position=${[0.12, 0.55, 0]}>
        <mesh position=${[0, -0.3, 0]} castShadow=${true}><capsuleGeometry args=${[0.09, 0.5, 4, 6]} /><meshStandardMaterial color="#2a1a0c" /></mesh>
      </group>
      <group ref=${legR} position=${[-0.12, 0.55, 0]}>
        <mesh position=${[0, -0.3, 0]} castShadow=${true}><capsuleGeometry args=${[0.09, 0.5, 4, 6]} /><meshStandardMaterial color="#2a1a0c" /></mesh>
      </group>
      <mesh position=${[0, 1.3, 0.3]} rotation=${[Math.PI / 2.4, 0, 0]} castShadow=${true}>
        <cylinderGeometry args=${[0.025, 0.025, 1.1, 5]} />
        <meshStandardMaterial color="#2a1a0c" />
      </mesh>
    </group>
  `;
}

// Coins.js - currency that falls from the sky and is collected
// ============================================================
function CoinDrop({ id, position, value }) {
  const group = useRef();
  const landed = useRef(false);
  const collected = useRef(false);

  useFrame((_, rawDelta) => {
    if (collected.current || !group.current) return;
    const delta = Math.min(rawDelta, 0.1);
    const obj = group.current;
    obj.rotation.y += delta * 3;

    if (!landed.current) {
      obj.position.y -= delta * 9;
      if (obj.position.y <= 0.6) {
        obj.position.y = 0.6;
        landed.current = true;
      }
      return;
    }

    const [px, , pz] = playerTransform.position;
    const dist = Math.hypot(obj.position.x - px, obj.position.z - pz);
    if (dist < 1.6) {
      collected.current = true;
      useGame.getState().collectCoinDrop(id, value);
    }
  });

  return html`
    <group ref=${group} position=${[position[0], 30, position[2]]}>
      <mesh rotation=${[Math.PI / 2, 0, 0]} castShadow=${true}>
        <cylinderGeometry args=${[0.4, 0.4, 0.08, 16]} />
        <meshStandardMaterial color="#ffd34d" metalness=${0.6} roughness=${0.3} emissive="#7a5a00" emissiveIntensity=${0.4} />
      </mesh>
    </group>
  `;
}

// Groups an inventory item id into a section for the inventory panel.
function getItemCategory(id) {
  const resource = RESOURCES[id];
  if (resource) return resource.category === 'food' ? 'Food' : 'Materials';
  if (WEAPONS[id]) return 'Weapons & Tools';
  return 'Other Loot';
}

function InventoryPanel() {
  const inventory = useGame((s) => s.inventory);
  const setActivePanel = useGame((s) => s.setActivePanel);
  const useItem = useGame((s) => s.useItem);
  const entries = Object.entries(inventory);

  const sections = ['Food', 'Materials', 'Weapons & Tools', 'Other Loot'];
  const grouped = Object.fromEntries(sections.map((sec) => [sec, []]));
  for (const entry of entries) grouped[getItemCategory(entry[0])].push(entry);

  return html`
    <div class="panel-overlay" onClick=${() => setActivePanel(null)}>
      <div class="panel" onClick=${(e) => e.stopPropagation()}>
        <h2>Inventory</h2>
        ${entries.length === 0 && html`<p>Empty. Gather resources with F, hunt animals, chop leaves with a machete, or scavenge loot with E.</p>`}
        ${sections.map((sec) => grouped[sec].length === 0 ? null : html`
          <${Fragment} key=${sec}>
            <h3 class="inv-section">${sec}</h3>
            ${grouped[sec].map(([id, qty]) => {
              const resource = RESOURCES[id];
              const recipe = CRAFTING_RECIPES.find((r) => r.id === id);
              const shopItem = SHOP_ITEMS.find((i) => i.id === id);
              const weapon = WEAPONS[id];
              const name = resource?.name || recipe?.name || shopItem?.name || weapon?.name || id;
              const usable = USABLE_ITEMS[id];
              return html`
                <div class="inv-item" key=${id}>
                  <span class="name">${name}</span>
                  <span>x${qty}</span>
                  ${usable && html`
                    <button class="buy-btn" onClick=${() => useItem(id)}>${usable.label}</button>
                  `}
                </div>
              `;
            })}
          <//>
        `)}
        <p class="close-hint">Tab or Esc to close</p>
      </div>
    </div>
  `;
}

// ============================================================
// TouchControls.js - on-screen joystick + action buttons for tablets/phones
// ============================================================
function TouchJoystick() {
  const baseRef = useRef(null);
  const thumbRef = useRef(null);
  const touchId = useRef(null);

  useEffect(() => {
    const base = baseRef.current;
    const thumb = thumbRef.current;
    const radius = 50;

    const setThumb = (dx, dy) => {
      thumb.style.transform = `translate(${dx}px, ${dy}px)`;
    };

    const onStart = (e) => {
      if (touchId.current !== null) return;
      const t = e.changedTouches[0];
      touchId.current = t.identifier;
      e.preventDefault();
    };
    const update = (t) => {
      const rect = base.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      let dx = t.clientX - cx;
      let dy = t.clientY - cy;
      const len = Math.hypot(dx, dy);
      if (len > radius) {
        dx = (dx / len) * radius;
        dy = (dy / len) * radius;
      }
      setThumb(dx, dy);
      touchInput.moveX = dx / radius;
      touchInput.moveZ = dy / radius;
    };
    const onMove = (e) => {
      for (const t of e.changedTouches) {
        if (t.identifier === touchId.current) {
          update(t);
          e.preventDefault();
        }
      }
    };
    const onEnd = (e) => {
      for (const t of e.changedTouches) {
        if (t.identifier === touchId.current) {
          touchId.current = null;
          touchInput.moveX = 0;
          touchInput.moveZ = 0;
          setThumb(0, 0);
        }
      }
    };

    base.addEventListener('touchstart', onStart, { passive: false });
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('touchend', onEnd);
    window.addEventListener('touchcancel', onEnd);
    return () => {
      base.removeEventListener('touchstart', onStart);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('touchend', onEnd);
      window.removeEventListener('touchcancel', onEnd);
      touchInput.moveX = 0;
      touchInput.moveZ = 0;
    };
  }, []);

  return html`
    <div class="touch-joystick" ref=${baseRef}>
      <div class="touch-joystick-thumb" ref=${thumbRef}></div>
    </div>
  `;
}

// A button that sets a virtual key while held (for jump/sprint/crouch).
function TouchHoldButton({ label, code, cls = '' }) {
  const onStart = (e) => { e.preventDefault(); keys[code] = true; };
  const onEnd = (e) => { e.preventDefault(); keys[code] = false; };
  return html`
    <div
      class="touch-btn ${cls}"
      onTouchStart=${onStart}
      onTouchEnd=${onEnd}
      onTouchCancel=${onEnd}
    >${label}</div>
  `;
}

// A button that fires a one-shot action on tap (interact/inventory/camera/etc).
function TouchTapButton({ label, onTap, cls = '' }) {
  const onStart = (e) => { e.preventDefault(); onTap(); };
  return html`
    <div class="touch-btn ${cls}" onTouchStart=${onStart}>${label}</div>
  `;
}

function TouchControls() {
  const nearInteractable = useGame((s) => s.nearInteractable);
  const interactLabel = nearInteractable ? (KEY_LABELS[nearInteractable.key] || nearInteractable.key) : 'E';

  return html`
    <div class="touch-controls">
      <${TouchJoystick} />
      <div class="touch-actions">
        <div class="touch-row">
          <${TouchTapButton} label="🎒" cls="touch-btn-sm" onTap=${() => simulateKeyPress('Tab')} />
          <${TouchTapButton} label="📷" cls="touch-btn-sm" onTap=${() => simulateKeyPress('KeyC')} />
          <${TouchTapButton} label="🔁" cls="touch-btn-sm" onTap=${() => simulateKeyPress('KeyQ')} />
          <${TouchTapButton} label="🔨" cls="touch-btn-sm" onTap=${() => simulateKeyPress('KeyB')} />
          <${TouchTapButton} label="💬" cls="touch-btn-sm" onTap=${() => useGame.getState().setChatOpen(true)} />
        </div>
        <div class="touch-row">
          <${TouchHoldButton} label="🐾" code="ControlLeft" cls="touch-btn-sm" />
          <${TouchHoldButton} label="💨" code="ShiftLeft" cls="touch-btn-sm" />
          <${TouchHoldButton} label="⬆️" code="Space" cls="touch-btn-sm" />
        </div>
        <div class="touch-row touch-row-main">
          <${TouchTapButton} label=${interactLabel} cls="touch-btn-lg" onTap=${() => {
            const near = useGame.getState().nearInteractable;
            if (near) near.onInteract();
          }} />
          <${TouchTapButton} label="🗡️" cls="touch-btn-lg" onTap=${() => simulateKeyPress('Digit0')} />
          <${TouchTapButton} label="⚔️" cls="touch-btn-lg touch-btn-attack" onTap=${() => touchInput.attack()} />
        </div>
      </div>
    </div>
  `;
}

function Hud() {
  const meters = useGame((s) => s.meters);
  const coins = useGame((s) => s.coins);
  const warriors = useGame((s) => s.warriors);
  const raid = useGame((s) => s.raid);
  const distantRaid = useGame((s) => s.distantRaid);
  const stats = useGame((s) => s.stats);
  const timeOfDay = useGame((s) => s.timeOfDay);
  const nearInteractable = useGame((s) => s.nearInteractable);
  const activePanel = useGame((s) => s.activePanel);
  const toasts = useGame((s) => s.toasts);
  const hotbarSlots = useGame((s) => s.hotbarSlots);
  const activeHotbarSlot = useGame((s) => s.activeHotbarSlot);
  const inventory = useGame((s) => s.inventory);
  const mpStatus = useGame((s) => s.mpStatus);
  const setActivePanel = useGame((s) => s.setActivePanel);
  const escortWarriors = useGame((s) => s.escortWarriors);
  const chatMessages = useGame((s) => s.chatMessages);
  const chatOpen = useGame((s) => s.chatOpen);
  const setChatOpen = useGame((s) => s.setChatOpen);
  const addChatMessage = useGame((s) => s.addChatMessage);
  const [chatText, setChatText] = useState('');
  const notifications = useGame((s) => s.notifications);
  const notifUnread = useGame((s) => s.notifUnread);
  const clearNotifUnread = useGame((s) => s.clearNotifUnread);
  const [notifOpen, setNotifOpen] = useState(false);
  const toggleNotif = () => { if (!notifOpen) clearNotifUnread(); setNotifOpen((v) => !v); };

  const sendChat = () => {
    const text = chatText.trim();
    if (text) {
      mpSend({ t: 'chat', text });
      addChatMessage('me', text);
    }
    setChatText('');
    setChatOpen(false);
  };

  return html`
    <div id="hud">
      <div class="meters-counter">
        <span class="label">METERS TRAVELED</span>
        ${Math.floor(meters)} m
        <div class="coins-line">🪙 ${coins}</div>
      </div>
      <div class="day-clock">🕐 ${formatTime(timeOfDay)}</div>
      <div class="tribe-panel" onClick=${() => setActivePanel(activePanel === 'tribe' ? null : 'tribe')}>
        ⚔️ ${warriors} warriors (${escortWarriors} with you)
      </div>

      <div class="mp-button ${mpStatus === 'connected' ? 'mp-connected' : ''}" onClick=${() => setActivePanel(activePanel === 'multiplayer' ? null : 'multiplayer')}>
        🌐 ${mpStatus === 'connected' ? 'Friend Online' : 'Multiplayer'}
      </div>

      <button class="notif-btn" onClick=${toggleNotif}>
        🔔${notifUnread > 0 ? ` ${notifUnread}` : ''}
      </button>

      ${notifOpen && html`
        <div class="notif-panel">
          <h3>NOTIFICATIONS</h3>
          ${notifications.length === 0 && html`<div style="color:rgba(255,255,255,0.3);font-size:12px;">No notifications yet.</div>`}
          ${[...notifications].reverse().map((n) => {
            const age = Math.floor((Date.now() - n.time) / 60000);
            const ts = age < 1 ? 'now' : age < 60 ? age + 'm' : Math.floor(age / 60) + 'h';
            return html`<div class="notif-entry ${n.type}" key=${n.id}>
              <span class="notif-time">${ts}</span>
              <span>${n.msg}</span>
            </div>`;
          })}
        </div>
      `}

      ${raid && html`
        <div class="raid-banner">⚠️ ${raid.tribeName} is attacking! Raiders incoming: ${raid.raiders.length}</div>
      `}
      ${distantRaid && html`
        <div class="raid-banner" style="background:rgba(80,20,80,0.85);">🏔️ ${distantRaid.tribeName} marching on ${distantRaid.targetTribeId ? (ENEMY_TRIBES.find((t) => t.id === distantRaid.targetTribeId)?.name ?? distantRaid.targetTribeId) + "'s camp" : 'your tribe'}! (${distantRaid.raiders.length} raiders)</div>
      `}

      <div class="stats-panel">
        <${StatBar} icon="❤️" value=${stats.health} cls="health" />
        <${StatBar} icon="🍖" value=${stats.hunger} cls="hunger" />
        <${StatBar} icon="💧" value=${stats.thirst} cls="thirst" />
        <${StatBar} icon="⚡" value=${stats.energy} cls="energy" />
        <${StatBar} icon="🔥" value=${stats.warmth} cls="warmth" />
        <${StatBar} icon="🧠" value=${stats.sanity} cls="sanity" />
      </div>

      ${!activePanel && html`<div class="crosshair"></div>`}

      ${nearInteractable && !activePanel && html`
        <div class="interact-prompt">Press ${KEY_LABELS[nearInteractable.key] || nearInteractable.key} to ${nearInteractable.label}</div>
      `}

      <div class="hotbar">
        ${hotbarSlots.map((id, i) => html`
          <div class="slot ${i === activeHotbarSlot ? 'active' : ''}" key=${id + i}>
            ${RESOURCES[id]?.name?.[0] || CRAFTING_RECIPES.find((r) => r.id === id)?.name?.[0] || SHOP_ITEMS.find((it) => it.id === id)?.name?.[0] || '?'}
            <span class="count">${inventory[id] || 0}</span>
          </div>
        `)}
      </div>

      <div class="toasts">
        ${toasts.map((t) => html`<div class="toast" key=${t.id}>${t.msg}</div>`)}
      </div>

      <div class="chat-log">
        ${chatMessages.map((m) => html`
          <div class="chat-msg ${m.from}" key=${m.id}>${m.from === 'me' ? 'You' : 'Friend'}: ${m.text}</div>
        `)}
      </div>

      ${chatOpen && html`
        <div class="chat-input-bar">
          <input
            type="text"
            autoFocus
            maxLength=${120}
            placeholder="Message your friend..."
            value=${chatText}
            onChange=${(e) => setChatText(e.target.value)}
            onKeyDown=${(e) => {
              if (e.key === 'Enter') sendChat();
              if (e.key === 'Escape') { setChatText(''); setChatOpen(false); }
            }}
          />
          <button onClick=${sendChat}>Send</button>
        </div>
      `}

      ${activePanel === 'inventory' && html`<${InventoryPanel} />`}
      ${activePanel === 'shop' && html`<${ShopPanel} />`}
      ${activePanel === 'tribe' && html`<${TribePanel} />`}
      ${activePanel === 'crafting' && html`<${CraftingPanel} />`}
      ${activePanel === 'build' && html`<${BuildPanel} />`}
      ${activePanel === 'multiplayer' && html`<${MultiplayerPanel} />`}

      ${isTouchDevice && !activePanel && html`<${TouchControls} />`}
    </div>
  `;
}

  return html`
    <div class="start-screen">
      <h1>JUNGLE KING</h1>
      <p>
        Survive a vast procedural jungle as the leader of your own tribe. Gather wood, fiber and stone,
        craft tools at the workbench, and build houses, lookout towers, walls and storage huts to grow
        your camp. Collect coins that fall from the sky and recruit warriors from Kito's shop to defend
        against rival tribes, who will occasionally raid your base. New rival tribes will arrive in the
        jungle over time, so choose some of your warriors to bring with you into battle - they'll fight
        back when you raid an enemy camp, and the rest will stay home to guard your base. Watch out for
        wild boars and curious monkeys as day turns to night.
      </p>
      <button onClick=${() => { start(); }}>Begin Survival</button>
      <div class="controls-list">
        WASD move &middot; Mouse or Arrow keys look (click to lock mouse) &middot; Space jump &middot; Shift sprint (drains energy)
        &middot; Ctrl crouch &middot; F gather / drink &middot; E talk to Kito / shop / pick up weapon &middot; R craft at workbench
        &middot; B build menu &middot; Tab inventory &middot; Q cycle hotbar &middot; C toggle camera &middot; Scroll zoom &middot; Esc close menus
        &middot; Left Click attack (throws spear, swings other weapons) &middot; 0 poke with spear
        &middot; T chat with your friend (multiplayer)
        &middot; Click the ⚔️ warriors panel (top left) to choose how many warriors fight alongside you
        &middot; On touch devices: drag the left joystick to move, drag anywhere to look, and use the on-screen buttons (including 💬 for chat)
        &middot; Click the 🌐 Multiplayer button (top right) to play together with a friend
      </div>
    </div>
  `;
}
