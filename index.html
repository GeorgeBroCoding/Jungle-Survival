<body>
  <div id="root"></div>
  <script type="module">
import React, { Fragment, useState, useMemo, useRef, useEffect } from 'react';
import { createRoot } from 'react-dom/client';
import * as THREE from 'three';
import { useFrame, useThree, Canvas } from '@react-three/fiber';
import { create } from 'zustand';
import htm from 'htm';
import { Peer } from 'peerjs';

// JSX-like template tag, no build step required.
// Usage: html`<mesh position=${[0,1,0]}><boxGeometry /></mesh>`
// Note: use <${Fragment}>...<//> instead of <>...</> - htm's empty-tag
// fragment shorthand isn't reliable when bound to React.createElement.
const html = htm.bind(React.createElement);

// ============================================================
// keyboard.js - global keyboard state
// ============================================================
const keys = {};
const pressHandlers = new Set();

function isTypingInField() {
  const el = document.activeElement;
  return !!el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA');
}

window.addEventListener('keydown', (e) => {
  if (isTypingInField()) return;
  if (!keys[e.code]) {
    for (const h of pressHandlers) h(e.code);
  }
  keys[e.code] = true;
});

window.addEventListener('keyup', (e) => {
  if (isTypingInField()) return;
  keys[e.code] = false;
});

function isKeyDown(code) {
  return !!keys[code];
}

// Fires once per physical key press (not held-repeat)
function onKeyPress(handler) {
  pressHandlers.add(handler);
  return () => pressHandlers.delete(handler);
}

// Lets on-screen touch buttons trigger the same one-shot actions as a key press.
function simulateKeyPress(code) {
  for (const h of pressHandlers) h(code);
}

// ============================================================
// touch.js - on-screen controls for tablets/phones (no keyboard/mouse)
// ============================================================
const isTouchDevice = (typeof window !== 'undefined')
  && (('ontouchstart' in window) || navigator.maxTouchPoints > 0);

// Written by the virtual joystick / look-drag, consumed each frame by Player.
const touchInput = {
  moveX: 0, moveZ: 0, // virtual joystick vector, same sign convention as WASD
  lookDX: 0, lookDY: 0, // accumulated look-drag delta (pixels) since last frame
  attack: () => {}, // wired up by Player to throw/swing the equipped weapon
};

// ============================================================
// multiplayer.js - optional 2-player peer-to-peer link via PeerJS
// (uses PeerJS's free public broker only to help the two devices find
// each other; gameplay data flows directly between the two browsers)
// ============================================================
const MP_CODE_CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no 0/O/1/I
function randomMpCode() {
  let code = '';
  for (let i = 0; i < 4; i++) code += MP_CODE_CHARS[Math.floor(Math.random() * MP_CODE_CHARS.length)];
  return code;
}

// Live connection objects (not React state - these are imperative singletons).
const mpState = { peer: null, conn: null };

// Latest known state of the other player, read every frame by RemotePlayer.
// position/yaw are interpolation targets; lerped toward in useFrame.
const remotePlayer = {
  active: false,
  position: [0, 1, 8],
  yaw: 0,
  moving: false,
  sprinting: false,
  crouching: false,
  equippedWeaponId: null,
  attackSeq: 0,
};

// ---- shared rival-tribe-camp state (host is authoritative) ----
// Host: populated each frame by TribeMember's wander AI, broadcast periodically.
const tribeMemberSyncData = {}; // { [memberId]: { position: [x,y,z], yaw } }
// Joiner: latest positions received from the host, lerped toward each frame.
const remoteTribeMembers = {}; // { [memberId]: { position: [x,y,z], yaw } }

function mpSetupConnection(conn) {
  mpState.conn = conn;
  conn.on('open', () => {
    useGame.getState().setMpStatus('connected');
    remotePlayer.active = true;
  });
  conn.on('data', (msg) => {
    if (!msg || typeof msg !== 'object') return;
    if (msg.t === 'state') {
      remotePlayer.position = msg.position;
      remotePlayer.yaw = msg.yaw;
      remotePlayer.moving = msg.moving;
      remotePlayer.sprinting = msg.sprinting;
      remotePlayer.crouching = msg.crouching;
      remotePlayer.equippedWeaponId = msg.equippedWeaponId;
    } else if (msg.t === 'attack') {
      remotePlayer.attackSeq++;
    } else if (msg.t === 'tribeSync') {
      Object.assign(remoteTribeMembers, msg.members);
      useGame.getState().setTribeMemberState(msg.tribeMemberState);
      useGame.getState().setCapturedTribes(msg.capturedTribes);
      useGame.getState().setActiveTribeIds(msg.activeTribeIds);
    } else if (msg.t === 'tribeDamage') {
      if (useGame.getState().mpRole === 'host') {
        useGame.getState().damageTribeMember(msg.id, msg.dmg);
      }
    } else if (msg.t === 'chat') {
      useGame.getState().addChatMessage('friend', msg.text);
    }
  });
  const onClose = () => {
    remotePlayer.active = false;
    if (mpState.conn === conn) {
      mpState.conn = null;
      useGame.getState().setMpStatus('offline');
      useGame.getState().setMpRole(null);
    }
  };
  conn.on('close', onClose);
  conn.on('error', onClose);
}

function mpHost() {
  mpDisconnect();
  const code = randomMpCode();
  const peer = new Peer(`jungleking-${code}`);
  mpState.peer = peer;
  useGame.getState().setMpStatus('hosting');
  useGame.getState().setMpCode(code);
  useGame.getState().setMpError(null);
  useGame.getState().setMpRole('host');
  peer.on('connection', (conn) => mpSetupConnection(conn));
  peer.on('error', (err) => {
    useGame.getState().setMpError(err && err.type === 'unavailable-id'
      ? 'That code is in use, try hosting again for a new one.'
      : 'Connection error: ' + (err && err.type || 'unknown'));
    useGame.getState().setMpStatus('offline');
  });
}

function mpJoin(code) {
  mpDisconnect();
  const peer = new Peer();
  mpState.peer = peer;
  useGame.getState().setMpStatus('connecting');
  useGame.getState().setMpError(null);
  useGame.getState().setMpRole('joiner');
  peer.on('open', () => {
    const conn = peer.connect(`jungleking-${code.trim().toUpperCase()}`);
    mpSetupConnection(conn);
  });
  peer.on('error', (err) => {
    useGame.getState().setMpError(err && err.type === 'peer-unavailable'
      ? 'No game found with that code.'
      : 'Connection error: ' + (err && err.type || 'unknown'));
    useGame.getState().setMpStatus('offline');
  });
}

function mpDisconnect() {
  if (mpState.conn) { try { mpState.conn.close(); } catch (e) {} }
  if (mpState.peer) { try { mpState.peer.destroy(); } catch (e) {} }
  mpState.conn = null;
  mpState.peer = null;
  remotePlayer.active = false;
  useGame.getState().setMpStatus('offline');
  useGame.getState().setMpCode('');
  useGame.getState().setMpRole(null);
}

function mpSend(msg) {
  if (mpState.conn && mpState.conn.open) {
    try { mpState.conn.send(msg); } catch (e) {}
  }
}

// Lazily-created shared audio context for tiny procedural sound effects
// (no audio assets in this project - everything is synthesized).
let sharedAudioCtx = null;
function playChingSound() {
  try {
    if (!sharedAudioCtx) sharedAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = sharedAudioCtx;
    if (ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;
    [2200, 3300].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.22 / (i + 1), now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.3);
    });
  } catch (err) {
    // Audio not available - ignore.
  }
}

// ============================================================
// interactions.js - "walk up and press a key" registry
// ============================================================
// Each entry: { id, position: [x,y,z], radius, key: 'KeyE'|'KeyF'|'KeyR', label, onInteract: fn }
const interactables = [];

function registerInteractable(entry) {
  interactables.push(entry);
  return () => {
    const idx = interactables.indexOf(entry);
    if (idx >= 0) interactables.splice(idx, 1);
  };
}

function findNearest(position, maxRadius = Infinity) {
  let best = null;
  let bestDist = maxRadius;
  for (const it of interactables) {
    const dx = it.position[0] - position[0];
    const dz = it.position[2] - position[2];
    const d = Math.hypot(dx, dz);
    if (d <= (it.radius ?? 2.5) && d <= bestDist) {
      best = it;
      bestDist = d;
    }
  }
  return best;
}

// World resource node placement (positions are fixed for now)
function generateResourceNodes() {
  const nodes = [];
  const rand = mulberry32(1337);
  for (let i = 0; i < 24; i++) {
    const angle = rand() * Math.PI * 2;
    const dist = 8 + rand() * 60;
    nodes.push({
      id: `tree_${i}`,
      type: 'wood',
      position: [Math.cos(angle) * dist, 0, Math.sin(angle) * dist],
    });
  }
  for (let i = 0; i < 14; i++) {
    const angle = rand() * Math.PI * 2;
    const dist = 6 + rand() * 50;
    nodes.push({
      id: `bush_${i}`,
      type: 'fiber',
      position: [Math.cos(angle) * dist, 0, Math.sin(angle) * dist],
    });
  }
  for (let i = 0; i < 10; i++) {
    const angle = rand() * Math.PI * 2;
    const dist = 10 + rand() * 55;
    nodes.push({
      id: `rock_${i}`,
      type: 'stone',
      position: [Math.cos(angle) * dist, 0, Math.sin(angle) * dist],
    });
  }
  return nodes;
}

// Deterministic PRNG so the world layout is stable across reloads
function mulberry32(seed) {
  return function () {
    seed |= 0;
    seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

let toastId = 0;
let chatId = 0;

const useGame = create((set, get) => ({
  // --- currency ---
  meters: 0,
  addMeters: (amount) => set((s) => ({ meters: s.meters + amount })),
  spendMeters: (amount) => {
    if (get().meters < amount) return false;
    set((s) => ({ meters: s.meters - amount }));
    return true;
  },

  // --- survival stats (0-100) ---
  stats: {
    health: 100,
    hunger: 100,
    thirst: 100,
    energy: 100,
    warmth: 100,
    sanity: 100,
  },
  adjustStat: (key, delta) =>
    set((s) => ({
      stats: {
        ...s.stats,
        [key]: Math.max(0, Math.min(100, s.stats[key] + delta)),
      },
    })),

  // --- time of day, 0-24 hours ---
  timeOfDay: 8,
  setTimeOfDay: (t) => set({ timeOfDay: ((t % 24) + 24) % 24 }),

  // --- inventory: itemId -> quantity ---
  inventory: { spear: 1 },
  addItem: (id, qty = 1) =>
    set((s) => ({ inventory: { ...s.inventory, [id]: (s.inventory[id] || 0) + qty } })),
  removeItem: (id, qty = 1) => {
    const have = get().inventory[id] || 0;
    if (have < qty) return false;
    set((s) => {
      const next = { ...s.inventory, [id]: have - qty };
      if (next[id] <= 0) delete next[id];
      return { inventory: next };
    });
    return true;
  },
  hasItems: (cost) => {
    const inv = get().inventory;
    return Object.entries(cost).every(([k, v]) => (inv[k] || 0) >= v);
  },

  // --- resource nodes (gather/respawn) ---
  resourceNodes: generateResourceNodes(),
  depletedNodes: {}, // id -> respawnAtTimestamp
  gatherNode: (node) => {
    const id = node.id;
    if (get().depletedNodes[id]) return false;
    const s = get();
    const activeWeapon = s.hotbarSlots[s.activeHotbarSlot];
    const choppingLeaves = node.type === 'wood' && activeWeapon === 'machete' && (s.inventory.machete || 0) > 0;
    if (choppingLeaves) {
      get().addItem('leaves', 2);
      get().addToast('+2 Leaves (chopped with Machete)');
    } else {
      get().addItem(node.type, 1);
      get().addToast(`+1 ${RESOURCES[node.type].name}`);
    }
    set((st) => ({ depletedNodes: { ...st.depletedNodes, [id]: Date.now() + 30000 } }));
    return true;
  },
  // --- general loot scattered on the map: pick up with E, respawns over time ---
  collectedLoot: {}, // id -> respawnAtTimestamp
  collectLoot: (spawn) => {
    if (get().collectedLoot[spawn.id]) return false;
    get().addItem(spawn.item, spawn.qty);
    set((s) => ({ collectedLoot: { ...s.collectedLoot, [spawn.id]: Date.now() + LOOT_RESPAWN_MS } }));
    get().addToast(`Found ${spawn.qty}x ${RESOURCES[spawn.item]?.name || spawn.item}!`);
    return true;
  },
  tickRespawns: () => {
    const now = Date.now();
    const depleted = get().depletedNodes;
    let changed = false;
    const next = { ...depleted };
    for (const id of Object.keys(depleted)) {
      if (depleted[id] <= now) {
        delete next[id];
        changed = true;
      }
    }
    if (changed) set({ depletedNodes: next });

    const collected = get().collectedLoot;
    let lootChanged = false;
    const nextLoot = { ...collected };
    for (const id of Object.keys(collected)) {
      if (collected[id] <= now) {
        delete nextLoot[id];
        lootChanged = true;
      }
    }
    if (lootChanged) set({ collectedLoot: nextLoot });

    get().tickAnimalRespawns();
  },

  // --- wild animals: health, death, loot, respawn ---
  animalState: Object.fromEntries(ANIMAL_SPAWNS.map((a) => [a.id, { health: a.health, alive: true, respawnAt: 0 }])),
  damageAnimal: (id, dmg) => {
    const spawn = ANIMAL_SPAWNS.find((a) => a.id === id);
    const cur = get().animalState[id];
    if (!spawn || !cur || !cur.alive) return;
    const health = cur.health - dmg;
    if (health <= 0) {
      set((s) => ({ animalState: { ...s.animalState, [id]: { health: 0, alive: false, respawnAt: Date.now() + ANIMAL_RESPAWN_MS } } }));
      for (const [k, v] of Object.entries(spawn.loot)) get().addItem(k, v);
      get().addToast(`${spawn.type === 'boar' ? 'Boar' : 'Monkey'} down! Loot collected.`);
    } else {
      set((s) => ({ animalState: { ...s.animalState, [id]: { ...cur, health } } }));
    }
  },
  tickAnimalRespawns: () => {
    const now = Date.now();
    const state = get().animalState;
    let changed = false;
    const next = { ...state };
    for (const [id, st] of Object.entries(state)) {
      if (!st.alive && st.respawnAt && st.respawnAt <= now) {
        const spawn = ANIMAL_SPAWNS.find((a) => a.id === id);
        next[id] = { health: spawn.health, alive: true, respawnAt: 0 };
        changed = true;
      }
    }
    if (changed) set({ animalState: next });
    get().tickTribeMemberRespawns();
  },

  // --- rival tribe members at their camps: health, death, loot, respawn ---
  tribeMemberState: Object.fromEntries([
    ...ENEMY_TRIBES.flatMap((tribe) =>
      TRIBE_MEMBER_OFFSETS.map((_, i) => [`${tribe.id}_m${i}`, { health: TRIBE_MEMBER_HEALTH, alive: true, respawnAt: 0 }])
    ),
    ...DISTANT_TRIBES.flatMap((tribe) =>
      TRIBE_MEMBER_OFFSETS.map((_, i) => [`dt_${tribe.id}_m${i}`, { health: TRIBE_MEMBER_HEALTH, alive: true, respawnAt: 0 }])
    ),
  ]),
  damageTribeMember: (id, dmg) => {
    const cur = get().tribeMemberState[id];
    if (!cur || !cur.alive) return;
    const tribeId = id.split('_m')[0];
    // Alert the rest of the camp - they'll all rush to fight back for a while.
    set((s) => ({ alertedCamps: { ...s.alertedCamps, [tribeId]: Date.now() + CAMP_ALERT_DURATION_MS } }));
    const health = cur.health - dmg;
    if (health <= 0) {
      set((s) => ({ tribeMemberState: { ...s.tribeMemberState, [id]: { health: 0, alive: false, respawnAt: Date.now() + TRIBE_MEMBER_RESPAWN_MS } } }));
      get().addMeters(TRIBE_MEMBER_REWARD.meters);
      get().addToast(`Rival tribesperson defeated! +${TRIBE_MEMBER_REWARD.meters}m`);
      if (ENEMY_TRIBES.some((t) => t.id === tribeId)) get().checkCampCapture(tribeId);
    } else {
      set((s) => ({ tribeMemberState: { ...s.tribeMemberState, [id]: { ...cur, health } } }));
    }
  },
  // --- alerted camps: when one member is attacked, the whole camp aggros for a while ---
  alertedCamps: {},
  // --- rival tribes that have "spawned in" and have an active camp on the map ---
  activeTribeIds: ENEMY_TRIBES.slice(0, ENEMY_TRIBES_INITIAL_COUNT).map((t) => t.id),
  setActiveTribeIds: (v) => set({ activeTribeIds: v }),
  spawnNextTribe: () => {
    // The host's tribeSync broadcast is authoritative for joiners.
    if (get().mpRole === 'joiner') return;
    const active = get().activeTribeIds;
    const next = ENEMY_TRIBES.find((t) => !active.includes(t.id));
    if (!next) return;
    set((s) => ({ activeTribeIds: [...s.activeTribeIds, next.id] }));
    get().addToast(`A new rival tribe has arrived: ${next.name}!`);
  },

  // --- captured rival camps: become the player's once every member is defeated ---
  capturedTribes: {},
  campOwners: {}, // { [tribeId]: ownerTribeId } — which enemy tribe currently controls this camp
  setCampOwner: (tribeId, ownerId) => set((s) => ({ campOwners: { ...s.campOwners, [tribeId]: ownerId } })),
  checkCampCapture: (tribeId) => {
    if (get().capturedTribes[tribeId]) return;
    const state = get().tribeMemberState;
    const allDown = TRIBE_MEMBER_OFFSETS.every((_, i) => !state[`${tribeId}_m${i}`]?.alive);
    if (!allDown) return;
    set((s) => {
      const campOwners = { ...s.campOwners };
      delete campOwners[tribeId];
      return { capturedTribes: { ...s.capturedTribes, [tribeId]: true }, campOwners };
    });
    get().addMeters(CAMP_CAPTURE_REWARD.meters);
    get().addCoins(CAMP_CAPTURE_REWARD.coins);
    const tribe = ENEMY_TRIBES.find((t) => t.id === tribeId);
    get().addToast(`${tribe.name}'s camp is now yours! +${CAMP_CAPTURE_REWARD.meters}m, +${CAMP_CAPTURE_REWARD.coins}c`);
    get().addToast(`3 tribespeople from ${tribe.name} join your side and settle into the camp!`);
    get().initGarrison(tribe.id);
  },
  tickTribeMemberRespawns: () => {
    // The host's tribeSync broadcast is authoritative for joiners.
    if (get().mpRole === 'joiner') return;
    const now = Date.now();
    const state = get().tribeMemberState;
    const captured = get().capturedTribes;
    let changed = false;
    const next = { ...state };
    for (const [id, st] of Object.entries(state)) {
      if (captured[id.split('_m')[0]]) continue; // captured camps stay empty
      if (!st.alive && st.respawnAt && st.respawnAt <= now) {
        next[id] = { health: TRIBE_MEMBER_HEALTH, alive: true, respawnAt: 0 };
        changed = true;
      }
    }
    if (changed) set({ tribeMemberState: next });
  },

  // --- weapon combat: thrown spears lying on the ground, and damage resolution ---
  groundWeapons: [], // [{ id, weaponId, position: [x,y,z] }]
  pickupWeapon: (groundId) => {
    const gw = get().groundWeapons.find((g) => g.id === groundId);
    if (!gw) return false;
    get().addItem(gw.weaponId, 1);
    set((s) => ({ groundWeapons: s.groundWeapons.filter((g) => g.id !== groundId) }));
    get().addToast(`Picked up ${WEAPONS[gw.weaponId].name}`);
    return true;
  },
  // Finds the closest animal/raider in front of the player within `range`.
  findAttackTarget: (range) => {
    const [px, , pz] = playerTransform.position;
    const yaw = playerTransform.yaw;
    const dirX = -Math.sin(yaw);
    const dirZ = -Math.cos(yaw);
    let best = null;
    let bestDist = range;
    for (const [id, pos] of Object.entries(entityRegistry.animals)) {
      if (!get().animalState[id]?.alive) continue;
      const dx = pos.x - px, dz = pos.z - pz;
      const dist = Math.hypot(dx, dz);
      if (dist > range || dist === 0) continue;
      const dot = (dx / dist) * dirX + (dz / dist) * dirZ;
      if (dot > Math.cos(ATTACK_CONE / 2) && dist <= bestDist) { best = { kind: 'animal', id, dist }; bestDist = dist; }
    }
    const raid = get().raid;
    if (raid) {
      for (const r of raid.raiders) {
        const pos = entityRegistry.raiders[r.id];
        if (!pos) continue;
        const dx = pos.x - px, dz = pos.z - pz;
        const dist = Math.hypot(dx, dz);
        if (dist > range || dist === 0) continue;
        const dot = (dx / dist) * dirX + (dz / dist) * dirZ;
        if (dot > Math.cos(ATTACK_CONE / 2) && dist <= bestDist) { best = { kind: 'raider', id: r.id, dist }; bestDist = dist; }
      }
    }
    for (const [id, pos] of Object.entries(entityRegistry.tribeMembers)) {
      if (!get().tribeMemberState[id]?.alive) continue;
      const dx = pos.x - px, dz = pos.z - pz;
      const dist = Math.hypot(dx, dz);
      if (dist > range || dist === 0) continue;
      const dot = (dx / dist) * dirX + (dz / dist) * dirZ;
      if (dot > Math.cos(ATTACK_CONE / 2) && dist <= bestDist) { best = { kind: 'tribeMember', id, dist }; bestDist = dist; }
    }
    const dr = get().distantRaid;
    if (dr) {
      for (const r of dr.raiders) {
        const pos = entityRegistry.distantRaiders[r.id];
        if (!pos) continue;
        const dx = pos.x - px, dz = pos.z - pz;
        const dist = Math.hypot(dx, dz);
        if (dist > range || dist === 0) continue;
        const dot = (dx / dist) * dirX + (dz / dist) * dirZ;
        if (dot > Math.cos(ATTACK_CONE / 2) && dist <= bestDist) { best = { kind: 'distantRaider', id: r.id, dist }; bestDist = dist; }
      }
    }
    const itr = get().interTribalRaid;
    if (itr) {
      for (const r of itr.raiders) {
        const pos = entityRegistry.interTribalRaiders[r.id];
        if (!pos) continue;
        const dx = pos.x - px, dz = pos.z - pz;
        const dist = Math.hypot(dx, dz);
        if (dist > range || dist === 0) continue;
        const dot = (dx / dist) * dirX + (dz / dist) * dirZ;
        if (dot > Math.cos(ATTACK_CONE / 2) && dist <= bestDist) { best = { kind: 'interTribalRaider', id: r.id, dist }; bestDist = dist; }
      }
    }
    return best;
  },
  applyDamageToTarget: (target, dmg) => {
    if (target.kind === 'animal') get().damageAnimal(target.id, dmg);
    else if (target.kind === 'raider') get().damageRaider(target.id, dmg);
    else if (target.kind === 'distantRaider') get().damageDistantRaider(target.id, dmg);
    else if (target.kind === 'interTribalRaider') get().damageInterTribalRaider(target.id, dmg);
    else if (target.kind === 'tribeMember') {
      // Rival tribe camps are simulated on the host; joiners ask the host
      // to apply the damage so health/captures stay in sync for both players.
      if (get().mpRole === 'joiner') mpSend({ t: 'tribeDamage', id: target.id, dmg });
      else get().damageTribeMember(target.id, dmg);
    }
  },
  // Spear poke: short-range stab, doesn't leave the player's hand.
  meleeAttack: (weaponId) => {
    const weapon = WEAPONS[weaponId];
    if (!weapon) return false;
    const dmg = weapon.pokeDamage ?? weapon.damage;
    const target = get().findAttackTarget(weapon.range);
    if (!target) return false;
    get().applyDamageToTarget(target, dmg);
    return true;
  },
  // Throws the equipped spear: it flies out, damages whatever it hits, and
  // lands on the ground to be picked back up later.
  flyingSpears: [], // [{ id, weaponId, start: [x,y,z], end: [x,y,z], startedAt }]
  throwWeapon: (weaponId) => {
    const weapon = WEAPONS[weaponId];
    if (!weapon || !weapon.throwable) return false;
    if (!get().removeItem(weaponId, 1)) return false;
    const [px, py, pz] = playerTransform.position;
    const yaw = playerTransform.yaw;
    const dirX = -Math.sin(yaw);
    const dirZ = -Math.cos(yaw);

    const target = get().findAttackTarget(THROW_RANGE);
    if (target) get().applyDamageToTarget(target, weapon.damage);

    const landDist = target ? Math.max(1, target.dist - 0.5) : THROW_RANGE;
    const landX = px + dirX * landDist;
    const landZ = pz + dirZ * landDist;
    const id = `gw_${Date.now()}_${Math.floor(Math.random() * 1000)}`;
    set((s) => ({
      flyingSpears: [...s.flyingSpears, {
        id, weaponId,
        start: [px + dirX * 0.6, py + 1.3, pz + dirZ * 0.6],
        end: [landX, getTerrainHeight(landX, landZ) + 0.05, landZ],
        startedAt: Date.now(),
      }],
    }));
    get().addToast(target ? `Spear hit its mark! Go pick it back up.` : `Spear thrown! Go pick it back up.`);
    return true;
  },
  landSpear: (id, posOverride) => {
    set((s) => {
      const spear = s.flyingSpears.find((f) => f.id === id);
      if (!spear) return {};
      return {
        flyingSpears: s.flyingSpears.filter((f) => f.id !== id),
        groundWeapons: [...s.groundWeapons, { id: spear.id, weaponId: spear.weaponId, position: posOverride ?? spear.end }],
      };
    });
  },

  // --- visual/audio effect events (e.g. machete "ching") ---
  fxEvents: [], // [{ id, type, position }]
  spawnFx: (type, position) => {
    const id = `fx_${Date.now()}_${Math.floor(Math.random() * 1000)}`;
    set((s) => ({ fxEvents: [...s.fxEvents, { id, type, position }] }));
  },
  removeFx: (id) => set((s) => ({ fxEvents: s.fxEvents.filter((f) => f.id !== id) })),

  // --- crafting ---
  craft: (recipeId) => {
    const recipe = CRAFTING_RECIPES.find((r) => r.id === recipeId);
    if (!recipe) return false;
    if (!get().hasItems(recipe.cost)) return false;
    for (const [k, v] of Object.entries(recipe.cost)) get().removeItem(k, v);
    get().addItem(recipe.id, 1);
    get().addToast(`Crafted ${recipe.name}`);
    return true;
  },

  // --- shop ---
  buyItem: (itemId) => {
    const item = SHOP_ITEMS.find((i) => i.id === itemId);
    if (!item) return false;
    if (!get().spendMeters(item.price)) {
      get().addToast(`Need ${item.price} meters for ${item.name}`);
      return false;
    }
    get().addItem(item.id, 1);
    get().addToast(`Bought ${item.name}`);
    return true;
  },

  // --- UI state ---
  activePanel: null, // null | 'inventory' | 'shop' | 'crafting'
  setActivePanel: (panel) => set({ activePanel: panel }),

  nearInteractable: null, // { type: 'gather'|'shop'|'craft', label, data }
  setNearInteractable: (v) => set({ nearInteractable: v }),

  hotbarSlots: ['spear', 'machete', 'club', 'torch', 'bandage'],
  activeHotbarSlot: 0,
  setActiveHotbarSlot: (i) => set({ activeHotbarSlot: i }),

  // --- multiplayer (P2P) ---
  mpStatus: 'offline', // 'offline' | 'hosting' | 'connecting' | 'connected'
  setMpStatus: (v) => set({ mpStatus: v }),
  mpCode: '',
  setMpCode: (v) => set({ mpCode: v }),
  mpError: null,
  setMpError: (v) => set({ mpError: v }),
  mpRole: null, // null | 'host' | 'joiner' - host's rival-tribe simulation is authoritative
  setMpRole: (v) => set({ mpRole: v }),
  setTribeMemberState: (v) => set({ tribeMemberState: v }),
  setCapturedTribes: (v) => set({ capturedTribes: v }),

  // --- toasts ---
  toasts: [],
  addToast: (msg) => {
    const id = ++toastId;
    set((s) => ({ toasts: [...s.toasts, { id, msg }] }));
    get().addNotification(msg, 'game');
    setTimeout(() => {
      set((s) => ({ toasts: s.toasts.filter((t) => t.id !== id) }));
    }, 3000);
  },

  // --- chat (multiplayer text messages) ---
  chatMessages: [],
  chatOpen: false,
  setChatOpen: (v) => set({ chatOpen: v }),
  addChatMessage: (from, text) => {

    get().addNotification(`${from === 'me' ? 'You' : 'Friend'}: ${text}`, 'chat');
    setTimeout(() => {
      set((s) => ({ chatMessages: s.chatMessages.filter((m) => m.id !== id) }));
    }, 8000);
  },

  // --- notifications (persistent log) ---
  notifications: [],
  notifUnread: 0,
  addNotification: (msg, type = 'game') => {

    }));

  clearNotifUnread: () => set({ notifUnread: 0 }),

  // --- coins (separate currency, collected from sky drops) ---
  coins: 0,
  addCoins: (amount) => {

  },
  spendCoins: (amount) => {

  // --- coin drops, fall from the sky and are collected on contact ---
  coinDrops: [],
  spawnCoinDrop: () => {
    const value = COIN_DROP_MIN + Math.floor(Math.random() * (COIN_DROP_MAX - COIN_DROP_MIN + 1));
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * COIN_SPAWN_RADIUS;
    const id = `coin_${Date.now()}_${Math.floor(Math.random() * 1000)}`;
    const position = [Math.cos(angle) * dist, 0, Math.sin(angle) * dist];
    set((s) => ({ coinDrops: [...s.coinDrops, { id, position, value }] }));
  },
  collectCoinDrop: (id, value) => {
    set((s) => ({ coinDrops: s.coinDrops.filter((c) => c.id !== id) }));
    get().addCoins(value);
  },

  // --- the player's tribe: recruit warriors to defend against raids ---
  warriors: 3,
  warriorsRecruited: 0,
  recruitWarrior: () => {
    const cost = WARRIOR_BASE_COST + get().warriorsRecruited * WARRIOR_COST_STEP;
    if (!get().spendCoins(cost)) {
      get().addToast(`Need ${cost} coins to recruit a warrior`);
      return false;
    }
    set((s) => ({ warriors: s.warriors + 1, warriorsRecruited: s.warriorsRecruited + 1 }));
    get().addToast('A new warrior joins your tribe!');
    return true;
  },

  // --- how many warriors come with the player to fight rival tribes (the rest guard the base) ---
  escortWarriors: 0,
  setEscortWarriors: (n) => set((s) => ({ escortWarriors: Math.max(0, Math.min(n, s.warriors)) })),

  // --- use an item from the inventory ---
  useItem: (id) => {
    const usable = USABLE_ITEMS[id];
    if (!usable) return false;
    if (usable.consumed && !get().removeItem(id, 1)) {
      get().addToast(`No ${id} left to use`);
      return false;
    }
    usable.apply(get());
    return true;
  },

  // --- player-built structures ---
  buildings: [],
  placeBuilding: (typeId) => {
    const type = BUILDING_TYPES.find((b) => b.id === typeId);
    if (!type) return false;
    if (!get().hasItems(type.cost)) {
      get().addToast(`Not enough resources for ${type.name}`);
      return false;
    }
    for (const [k, v] of Object.entries(type.cost)) get().removeItem(k, v);
    const [px, , pz] = playerTransform.position;
    const yaw = playerTransform.yaw;
    const dist = 4;
    const x = px - Math.sin(yaw) * dist;
    const z = pz - Math.cos(yaw) * dist;
    const id = `bld_${Date.now()}_${Math.floor(Math.random() * 1000)}`;
    set((s) => ({ buildings: [...s.buildings, { id, type: typeId, position: [x, 0, z], rotation: yaw }] }));
    get().addToast(`Built ${type.name}`);
    return true;
  },

  // --- rival tribe raids — can target home base OR any player-owned team camp ---
  raid: null, // { tribeId, tribeName, color, targetPos, targetTribeId, raiders: [{ id, position }] }
  startRaid: () => {
    if (get().raid) return;
    const s = get();
    const available = ENEMY_TRIBES.filter((t) => s.activeTribeIds.includes(t.id) && !s.capturedTribes[t.id]);
    if (!available.length) return;
    const tribe = available[Math.floor(Math.random() * available.length)];
    const capturedIds = Object.keys(s.capturedTribes).filter((id) => s.capturedTribes[id]);
    let targetPos = BASE_CENTER;
    let targetTribeId = null;
    if (capturedIds.length > 0 && Math.random() < 0.5) {
      const tId = capturedIds[Math.floor(Math.random() * capturedIds.length)];
      const t = ENEMY_TRIBES.find((et) => et.id === tId);
      if (t) { targetPos = t.campPosition; targetTribeId = tId; }
    }
    const count = 3 + Math.floor(Math.random() * 4);
    const raiders = Array.from({ length: count }, (_, i) => ({
      id: `raider_${Date.now()}_${i}`,
      health: 40,
      position: [tribe.campPosition[0] + (Math.random() - 0.5) * 6, 0, tribe.campPosition[2] + (Math.random() - 0.5) * 6],
    }));
    const targetLabel = targetTribeId ? ENEMY_TRIBES.find((et) => et.id === targetTribeId).name + "'s camp (yours)" : 'your tribe';
    set({ raid: { tribeId: tribe.id, tribeName: tribe.name, color: tribe.color, targetPos, targetTribeId, raiders } });
    get().addToast(`${tribe.name} is raiding ${targetLabel}!`);
  },
  resolveRaider: (raiderId, raiderWon) => {
    const raid = get().raid;
    if (!raid) return;
    const raiders = raid.raiders.filter((r) => r.id !== raiderId);
    set({ raid: raiders.length ? { ...raid, raiders } : null });
    if (raiderWon) {
      if (raid.targetTribeId) {
        get().damageGarrison(raid.targetTribeId, 30);
        const tribe = ENEMY_TRIBES.find((t) => t.id === raid.targetTribeId);
        get().addToast(`A raider struck ${tribe?.name ?? ''}'s garrison!`);
      } else {
        get().adjustStat('health', -10);
        if (get().warriors > 0) set((s) => ({ warriors: s.warriors - 1, escortWarriors: Math.min(s.escortWarriors, s.warriors - 1) }));
        get().addToast('A raider broke through and damaged your tribe!');
      }
    } else {
      get().addToast('Your warriors repelled a raider!');
    }
    if (!raiders.length) get().addToast(`${raid.tribeName} retreats!`);
  },
  damageRaider: (raiderId, dmg) => {
    const raid = get().raid;
    if (!raid) return;
    const raider = raid.raiders.find((r) => r.id === raiderId);
    if (!raider) return;
    const health = (raider.health ?? 40) - dmg;
    if (health <= 0) {
      get().resolveRaider(raiderId, false);
      get().addToast('Raider struck down!');
    } else {
      set({ raid: { ...raid, raiders: raid.raiders.map((r) => (r.id === raiderId ? { ...r, health } : r)) } });
    }
  },

  // --- garrison at captured team camps ---
  garrisonHP: {},
  initGarrison: (tribeId) => {
    set((s) => ({ garrisonHP: { ...s.garrisonHP, [tribeId]: GARRISON_HEALTH } }));
  },
  damageGarrison: (tribeId, dmg) => {
    const current = get().garrisonHP[tribeId] ?? GARRISON_HEALTH;
    const hp = current - dmg;
    if (hp <= 0) {
      const gpCopy = { ...get().garrisonHP };
      const cpCopy = { ...get().capturedTribes };
      delete gpCopy[tribeId];
      delete cpCopy[tribeId];
      set({ garrisonHP: gpCopy, capturedTribes: cpCopy });
      const tribe = ENEMY_TRIBES.find((t) => t.id === tribeId);
      get().addToast(`${tribe?.name ?? tribeId}'s camp has been overrun — it's no longer yours!`);
    } else {
      set((s) => ({ garrisonHP: { ...s.garrisonHP, [tribeId]: hp } }));
    }
  },

  // --- distant tribe raids — can target any player-held area ---
  distantRaid: null,
  startDistantRaid: () => {
    if (get().distantRaid) return;
    const s = get();
    const dtribe = DISTANT_TRIBES[Math.floor(Math.random() * DISTANT_TRIBES.length)];
    const capturedIds = Object.keys(s.capturedTribes).filter((id) => s.capturedTribes[id]);
    const targets = ['base', ...capturedIds];
    const picked = targets[Math.floor(Math.random() * targets.length)];
    const targetTribeId = picked === 'base' ? null : picked;
    const targetPos = targetTribeId ? ENEMY_TRIBES.find((t) => t.id === targetTribeId).campPosition : BASE_CENTER;
    const count = 1 + Math.floor(Math.random() * 3);
    const raiders = Array.from({ length: count }, (_, i) => ({
      id: `dr_${Date.now()}_${i}`,
      health: 40,
      position: [dtribe.campPosition[0] + (Math.random() - 0.5) * 8, 0, dtribe.campPosition[2] + (Math.random() - 0.5) * 8],
    }));
    const targetName = targetTribeId ? (ENEMY_TRIBES.find((t) => t.id === targetTribeId)?.name ?? targetTribeId) + "'s camp" : 'your tribe';
    set({ distantRaid: { tribeId: dtribe.id, tribeName: dtribe.name, color: dtribe.color, targetTribeId, targetPos, raiders } });
    get().addToast(`⚠️ ${dtribe.name} is marching on ${targetName}!`);
  },
  resolveDistantRaider: (raiderId, raiderWon) => {
    const dr = get().distantRaid;
    if (!dr) return;
    const raiders = dr.raiders.filter((r) => r.id !== raiderId);
    set({ distantRaid: raiders.length ? { ...dr, raiders } : null });
    if (raiderWon) {
      if (dr.targetTribeId) {
        get().damageGarrison(dr.targetTribeId, 35);
      } else {
        get().adjustStat('health', -8);
        get().addToast('A distant raider breached your camp!');
      }
    }
    if (!raiders.length) get().addToast(`${dr.tribeName} retreats!`);
  },
  damageDistantRaider: (raiderId, dmg) => {
    const dr = get().distantRaid;
    if (!dr) return;
    const raider = dr.raiders.find((r) => r.id === raiderId);
    if (!raider) return;
    const health = (raider.health ?? 40) - dmg;
    if (health <= 0) {
      get().resolveDistantRaider(raiderId, false);
      get().addToast('Distant raider struck down!');
    } else {
      set({ distantRaid: { ...dr, raiders: dr.raiders.map((r) => (r.id === raiderId ? { ...r, health } : r)) } });
    }
  },

  // --- inter-tribal warfare: enemy tribes raid each other's camps ---
  interTribalRaid: null,
  startInterTribalRaid: () => {
    if (get().interTribalRaid) return;
    const s = get();
    const active = s.activeTribeIds;
    if (active.length < 2) return;
    const attackerCandidates = active.filter((id) => !s.capturedTribes[id]);
    if (!attackerCandidates.length) return;
    const attackerId = attackerCandidates[Math.floor(Math.random() * attackerCandidates.length)];
    const targetCandidates = active.filter((id) => id !== attackerId);
    if (!targetCandidates.length) return;
    const targetId = targetCandidates[Math.floor(Math.random() * targetCandidates.length)];
    const attacker = ENEMY_TRIBES.find((t) => t.id === attackerId);
    const target = ENEMY_TRIBES.find((t) => t.id === targetId);
    const count = 2 + Math.floor(Math.random() * 2);
    const raiders = Array.from({ length: count }, (_, i) => ({
      id: `itr_${Date.now()}_${i}`,
      health: 30,
      position: [attacker.campPosition[0] + (Math.random() - 0.5) * 8, 0, attacker.campPosition[2] + (Math.random() - 0.5) * 8],
    }));
    const targetLabel = s.capturedTribes[targetId] ? `${target.name}'s camp (yours!)` : target.name;
    set({ interTribalRaid: { attackerId, attackerName: attacker.name, attackerColor: attacker.color, targetId, targetName: target.name, targetPos: target.campPosition, raiders } });
    get().addToast(`⚔️ ${attacker.name} attacks ${targetLabel}!`);
  },
  resolveInterTribalRaider: (raiderId, raiderWon) => {
    const itr = get().interTribalRaid;
    if (!itr) return;
    const raiders = itr.raiders.filter((r) => r.id !== raiderId);
    set({ interTribalRaid: raiders.length ? { ...itr, raiders } : null });
    if (raiderWon) {
      if (get().capturedTribes[itr.targetId]) {
        get().damageGarrison(itr.targetId, 30);
      } else {
        const prevOwner = get().campOwners[itr.targetId];
        get().setCampOwner(itr.targetId, itr.attackerId);
        const target = ENEMY_TRIBES.find((t) => t.id === itr.targetId);
        const prevName = prevOwner ? ENEMY_TRIBES.find((t) => t.id === prevOwner)?.name : target.name;
        get().addToast(`${itr.attackerName} has claimed ${prevName}'s camp!`);
      }
    }
    if (!raiders.length) get().addToast(`${itr.attackerName} retreats!`);
  },
  damageInterTribalRaider: (raiderId, dmg) => {
    const itr = get().interTribalRaid;
    if (!itr) return;
    const raider = itr.raiders.find((r) => r.id === raiderId);
    if (!raider) return;
    const health = (raider.health ?? 30) - dmg;
    if (health <= 0) {
      get().resolveInterTribalRaider(raiderId, false);
      get().addToast('Warring tribesperson struck down!');
    } else {
      set({ interTribalRaid: { ...itr, raiders: itr.raiders.map((r) => (r.id === raiderId ? { ...r, health } : r)) } });
    }
  },

  // --- game start ---
  started: false,
  start: () => set({ started: true }),
}));

function createGrassTexture() {
  const size = 256;
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#3f7d3a';
  ctx.fillRect(0, 0, size, size);

  // speckle variation
  for (let i = 0; i < 4000; i++) {
    const x = Math.random() * size;
    const y = Math.random() * size;
    const shade = Math.random();
    ctx.fillStyle = shade > 0.5
      ? `rgba(60, 110, 50, ${0.2 + Math.random() * 0.3})`
      : `rgba(30, 70, 30, ${0.2 + Math.random() * 0.3})`;
    ctx.fillRect(x, y, 2, 2);
  }

  // patches of dirt
  for (let i = 0; i < 14; i++) {
    const x = Math.random() * size;
    const y = Math.random() * size;
    const r = 4 + Math.random() * 10;
    ctx.fillStyle = 'rgba(110, 80, 45, 0.25)';
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(40, 40);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function createBarkTexture() {
  const size = 64;
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#5a3c22';
  ctx.fillRect(0, 0, size, size);

  for (let i = 0; i < size; i += 3) {
    ctx.fillStyle = `rgba(40, 25, 15, ${0.2 + Math.random() * 0.3})`;
    ctx.fillRect(0, i, size, 1 + Math.random() * 2);
  }

  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(1, 2);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function createWaterTexture() {
  const size = 128;
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#1a6fa3');
  grad.addColorStop(1, '#2f9bd6');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);

  for (let i = 0; i < 200; i++) {
    ctx.strokeStyle = `rgba(255,255,255,${0.05 + Math.random() * 0.1})`;
    ctx.beginPath();
    const y = Math.random() * size;
    ctx.moveTo(0, y);
    ctx.bezierCurveTo(size * 0.3, y + 5, size * 0.7, y - 5, size, y);
    ctx.stroke();
  }

  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(8, 8);
  return tex;
}

// ============================================================
// World.js - terrain, sky/lighting, day-night cycle, foliage
// ============================================================
const DAY_LENGTH_SECONDS = 600; // full 24h cycle takes 10 real minutes

const SKY_KEYFRAMES = [
  { t: 0,  color: new THREE.Color('#0a0e2a') },  // midnight
  { t: 5,  color: new THREE.Color('#16213b') },  // pre-dawn
  { t: 6,  color: new THREE.Color('#f6a35c') },  // dawn
  { t: 8,  color: new THREE.Color('#8ec9f0') },  // morning
  { t: 12, color: new THREE.Color('#6fb8ee') },  // noon
  { t: 17, color: new THREE.Color('#f0a35c') },  // afternoon glow
  { t: 19, color: new THREE.Color('#c1546b') },  // sunset
  { t: 21, color: new THREE.Color('#1c1740') },  // dusk
  { t: 24, color: new THREE.Color('#0a0e2a') },  // midnight wrap
];

function getSkyColor(t) {
  for (let i = 0; i < SKY_KEYFRAMES.length - 1; i++) {
    const a = SKY_KEYFRAMES[i];
    const b = SKY_KEYFRAMES[i + 1];
    if (t >= a.t && t <= b.t) {
      const f = (t - a.t) / (b.t - a.t);
      return a.color.clone().lerp(b.color, f);
    }
  }
  return SKY_KEYFRAMES[0].color.clone();
}

function getSunIntensity(t) {
  // Highest at noon, near-zero at night
  const angle = ((t - 6) / 24) * Math.PI * 2;
  const h = Math.sin(angle);
  return Math.max(0.05, h) * 1.4;
}

// ---------- Sky / Lighting / day-night cycle ----------
function DayNightSystem() {
  const { scene } = useThree();
  const sunRef = useRef();
  const clockAccum = useRef(0);
  const localTime = useRef(8); // hours

  useFrame((_, delta) => {
    clockAccum.current += delta;
    localTime.current = (8 + (clockAccum.current / DAY_LENGTH_SECONDS) * 24) % 24;
    const t = localTime.current;

    const sky = getSkyColor(t);
    scene.background = sky;
    if (scene.fog) scene.fog.color = sky;

    const angle = ((t - 6) / 24) * Math.PI * 2;
    const sunDist = 150;
    const sunY = Math.sin(angle) * sunDist;
    const sunX = Math.cos(angle) * sunDist;
    if (sunRef.current) {
      sunRef.current.position.set(sunX, Math.max(sunY, -20), 40);
      sunRef.current.intensity = getSunIntensity(t);
      const warmth = Math.max(0, 1 - Math.abs(t - 6) / 4) + Math.max(0, 1 - Math.abs(t - 18) / 4);
      sunRef.current.color.set(warmth > 0.3 ? '#ffb37a' : '#ffffff');
    }

    // push time of day to store roughly once per second
    if (Math.floor(clockAccum.current * 4) !== Math.floor((clockAccum.current - delta) * 4)) {
      useGame.getState().setTimeOfDay(t);
    }
  });

  return html`
    <${Fragment}>
      <directionalLight ref=${sunRef} position=${[50, 80, 40]} intensity=${1} castShadow
        shadow-mapSize-width=${2048} shadow-mapSize-height=${2048}
        shadow-camera-far=${300} shadow-camera-left=${-120} shadow-camera-right=${120}
        shadow-camera-top=${120} shadow-camera-bottom=${-120} />
      <ambientLight intensity=${0.35} color="#bcd4ff" />
      <hemisphereLight args=${['#bcd4ff', '#3a5a30', 0.5]} />
    <//>
  `;
}

// ---------- Terrain: rolling hills + a ring of distant mountains ----------
// Each entry is a smooth "bump" added to the terrain height field. Bumps are placed
// in the gaps between rival tribe camps and well clear of the base/resources/animals,
// so the core play area stays flat while the wider jungle gets real hills and mountains.
const TERRAIN_HILLS = [
  // mid-range hills
  { x: 86.1, z: 40.1, amp: 5, r: 13 },
  { x: 27.8, z: 90.9, amp: 6, r: 14 },
  { x: -43.1, z: 84.6, amp: 5, r: 13 },
  { x: -95, z: -2, amp: 6, r: 14 },
  { x: 3, z: -95, amp: 5, r: 13 },
  { x: 90.3, z: -29.4, amp: 5, r: 13 },
  // distant mountains
  { x: 172.2, z: 80.3, amp: 20, r: 40 },
  { x: 55.5, z: 181.7, amp: 22, r: 42 },
  { x: -86.3, z: 169.3, amp: 24, r: 45 },
  { x: -190, z: -3.3, amp: 20, r: 40 },
  { x: 6.6, z: -189.9, amp: 22, r: 42 },
  { x: 180.7, z: -58.7, amp: 24, r: 45 },
];

function getTerrainHeight(x, z) {
  let h = 0;
  for (const hill of TERRAIN_HILLS) {
    const dx = x - hill.x;
    const dz = z - hill.z;
    const d2 = dx * dx + dz * dz;
    h += hill.amp * Math.exp(-d2 / (2 * hill.r * hill.r));
  }
  return h;
}

// ---------- Biomes ----------
const BIOME_ZONES = [
  { cx: 0,    cz: 0,    r: 65,  color: [0.15, 0.35, 0.10] }, // woodland (center)
  { cx: 155,  cz: -50,  r: 115, color: [0.83, 0.73, 0.42] }, // sandy desert (NE)
  { cx: -45,  cz: -175, r: 115, color: [0.82, 0.88, 0.92] }, // snowy (N)
  { cx: -155, cz: -100, r: 110, color: [0.50, 0.46, 0.42] }, // rocky (W)
  { cx: 30,   cz: 175,  r: 110, color: [0.18, 0.34, 0.16] }, // swamp (S)
];
function getBiomeColor(x, z) {
  let tw = 0, r = 0, g = 0, b = 0;
  for (const zone of BIOME_ZONES) {
    const dx = x - zone.cx, dz = z - zone.cz;
    const w = Math.exp(-(dx * dx + dz * dz) / (2 * zone.r * zone.r));
    tw += w; r += zone.color[0] * w; g += zone.color[1] * w; b += zone.color[2] * w;
  }
  if (tw > 0) { r /= tw; g /= tw; b /= tw; }
  const n = Math.sin(x * 3.73 + z * 2.31) * Math.sin(z * 4.17 - x * 1.91) * 0.04;
  return [Math.min(1, Math.max(0, r + n)), Math.min(1, Math.max(0, g + n * 1.1)), Math.min(1, Math.max(0, b + n * 0.9))];
}
function getDominantBiome(x, z) {
  let bestW = -1, best = 0;
  for (let i = 0; i < BIOME_ZONES.length; i++) {
    const zone = BIOME_ZONES[i];
    const dx = x - zone.cx, dz = z - zone.cz;
    const w = Math.exp(-(dx * dx + dz * dz) / (2 * zone.r * zone.r));
    if (w > bestW) { bestW = w; best = i; }
  }
  return best; // 0=woodland, 1=sandy, 2=snow, 3=rocky, 4=swamp
}

// ---------- Ground ----------
const TERRAIN_SIZE = 600;
const TERRAIN_SEGMENTS = 100;

function createTerrainGeometry() {
  const geo = new THREE.BufferGeometry();
  const half = TERRAIN_SIZE / 2;
  const seg = TERRAIN_SEGMENTS;
  const positions = [];
  const uvs = [];
  const colors = [];
  const indices = [];
  for (let iz = 0; iz <= seg; iz++) {
    for (let ix = 0; ix <= seg; ix++) {
      const x = -half + (ix / seg) * TERRAIN_SIZE;
      const z = -half + (iz / seg) * TERRAIN_SIZE;
      positions.push(x, getTerrainHeight(x, z), z);
      uvs.push(ix / seg, iz / seg);
      const [cr, cg, cb] = getBiomeColor(x, z);
      colors.push(cr, cg, cb);
    }
  }
  for (let iz = 0; iz < seg; iz++) {
    for (let ix = 0; ix < seg; ix++) {
      const a = iz * (seg + 1) + ix;
      const b = a + 1;
      const c = a + (seg + 1);
      const d = c + 1;
      indices.push(a, c, b, b, c, d);
    }
  }
  geo.setIndex(indices);
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  geo.computeVertexNormals();
  return geo;
}

function Ground() {
  const geo = useMemo(() => createTerrainGeometry(), []);
  return html`
    <mesh geometry=${geo} receiveShadow=${true}>
      <meshStandardMaterial vertexColors=${true} roughness=${0.9} />
    </mesh>
  `;
}

// ---------- Decorative scattered foliage (non-interactable, purely visual) ----------
function DecorativeFoliage() {
  const items = useMemo(() => {
    const rand = mulberry32(99);
    const trees = [], bushes = [], snowTrees = [], cacti = [], boulders = [];
    for (let i = 0; i < 220; i++) {
      const angle = rand() * Math.PI * 2;
      const dist = 10 + rand() * 220;
      const x = Math.cos(angle) * dist;
      const z = Math.sin(angle) * dist;
      if (Math.hypot(x, z) < 10) continue;
      if (Math.hypot(x - 40, z + 40) < 14) continue;
      const y = getTerrainHeight(x, z);
      const s = 0.7 + rand() * 0.9;
      const biome = getDominantBiome(x, z);
      if (biome === 0) { // woodland — dense trees + bushes
        if (rand() > 0.3) trees.push({ position: [x, y, z], scale: s });
        else bushes.push({ position: [x, y, z], scale: s * 0.8 });
      } else if (biome === 1) { // sandy — sparse cacti
        if (rand() > 0.55) cacti.push({ position: [x, y, z], scale: 0.5 + rand() * 0.7 });
      } else if (biome === 2) { // snowy — snow-capped pines
        if (rand() > 0.35) snowTrees.push({ position: [x, y, z], scale: s });
      } else if (biome === 3) { // rocky — boulders
        if (rand() > 0.45) boulders.push({ position: [x, y, z], scale: 0.4 + rand() * 1.8 });
      } else { // swamp — dark shrubs
        bushes.push({ position: [x, y, z], scale: s * 0.9 });
      }
    }
    return { trees, bushes, snowTrees, cacti, boulders };
  }, []);

  return html`
    <${Fragment}>
      ${items.trees.map((t, i) => html`<${Tree} key=${'dt' + i} position=${t.position} scale=${t.scale} />`)}
      ${items.bushes.map((b, i) => html`<${Bush} key=${'db' + i} position=${b.position} scale=${b.scale} />`)}
      ${items.snowTrees.map((t, i) => html`<${SnowTree} key=${'dst' + i} position=${t.position} scale=${t.scale} />`)}
      ${items.cacti.map((c, i) => html`<${Cactus} key=${'dc' + i} position=${c.position} scale=${c.scale} />`)}
      ${items.boulders.map((r, i) => html`<${Rock} key=${'dbr' + i} position=${r.position} scale=${r.scale} />`)}
    <//>
  `;
}

}

const SPRINT_MULT = 1.8;
const CROUCH_MULT = 0.5;
const JUMP_SPEED = 6.5;
const GRAVITY = 22;

const POND_CENTER = [40, -40];
const POND_RADIUS = 18;

const UP = new THREE.Vector3(0, 1, 0);

// Plays a per-weapon sound/visual flourish when it's used to attack.
function triggerWeaponFx(weaponId) {
  if (weaponId === 'machete') {
    playChingSound();
    const [px, py, pz] = playerTransform.position;
    const yaw = playerTransform.yaw;
    const dirX = -Math.sin(yaw);
    const dirZ = -Math.cos(yaw);
    useGame.getState().spawnFx('ching', [px + dirX * 1.2, py + 1.3, pz + dirZ * 1.2]);
  }
}

// ---------- Weapon held in the right hand, swapped based on the active hotbar slot ----------
function HeldWeapon({ id }) {
  if (id === 'spear') {
    return html`
      <group position=${[0, -0.55, -0.05]} rotation=${[1.35, 0, 0]}>
        <mesh position=${[0, 0.55, 0]} castShadow=${true}>
          <cylinderGeometry args=${[0.025, 0.03, 1.3, 6]} />
          <meshStandardMaterial color="#8a5a2b" roughness=${0.8} flatShading=${true} />
        </mesh>
        <mesh position=${[0, 1.25, 0]} castShadow=${true}>
          <coneGeometry args=${[0.06, 0.3, 6]} />
          <meshStandardMaterial color="#b9b9b9" metalness=${0.4} roughness=${0.4} flatShading=${true} />
        </mesh>
      </group>
    `;
  }
  if (id === 'machete') {
    return html`
      <group position=${[0, -0.5, -0.05]} rotation=${[1.15, 0, 0.1]}>
        <mesh position=${[0, 0.12, 0]} castShadow=${true}>
          <cylinderGeometry args=${[0.035, 0.035, 0.25, 6]} />
          <meshStandardMaterial color="#4a3322" roughness=${0.9} flatShading=${true} />
        </mesh>
        <mesh position=${[0, 0.55, 0]} castShadow=${true}>
          <boxGeometry args=${[0.07, 0.75, 0.02]} />
          <meshStandardMaterial color="#cfd6dd" metalness=${0.6} roughness=${0.3} flatShading=${true} />
        </mesh>
      </group>
    `;
  }
  if (id === 'club') {
    return html`
      <group position=${[0, -0.5, -0.05]} rotation=${[1.25, 0, 0]}>
        <mesh position=${[0, 0.3, 0]} castShadow=${true}>
          <cylinderGeometry args=${[0.04, 0.05, 0.6, 6]} />
          <meshStandardMaterial color="#6b4a2b" roughness=${0.9} flatShading=${true} />
        </mesh>
        <mesh position=${[0, 0.68, 0]} castShadow=${true}>
          <sphereGeometry args=${[0.13, 8, 8]} />
          <meshStandardMaterial color="#5a3c22" roughness=${0.9} flatShading=${true} />
        </mesh>
      </group>
    `;
  }
  return null;
}

function Player() {
  const { camera, gl } = useThree();
  const group = useRef();
  const leftArm = useRef();
  const rightArm = useRef();
  const leftLeg = useRef();
  const rightLeg = useRef();
  const bodyVisual = useRef();
  const fpWeapon = useRef();
  const fpWeaponAnim = useRef();

  const yaw = useRef(0);
  const pitch = useRef(-0.18);
  const velocityY = useRef(0);
  const onGround = useRef(true);
  const camDistance = useRef(6);
  const cameraMode = useRef('third'); // 'third' | 'first'
  const limbPhase = useRef(0);
  const statTimer = useRef(0);
  const lastNearId = useRef(null);
  const inWater = useRef(false);
  const attackTimer = useRef(0);
  const mpSendTimer = useRef(0);

  const equippedWeaponId = useGame((s) => {
    const slot = s.hotbarSlots[s.activeHotbarSlot];
    return WEAPONS[slot] && (s.inventory[slot] || 0) > 0 ? slot : null;
  });

  const mpRole = useGame((s) => s.mpRole);
  useEffect(() => {
    if (mpRole === 'joiner' && group.current) {
      group.current.position.set(FRIEND_BASE_CENTER[0], getTerrainHeight(FRIEND_BASE_CENTER[0], FRIEND_BASE_CENTER[2]), FRIEND_BASE_CENTER[2]);
      velocityY.current = 0;
    }
  }, [mpRole]);

  useEffect(() => {
    const canvas = gl.domElement;
    const onClick = () => {
      if (useGame.getState().activePanel === null && canvas.requestPointerLock) canvas.requestPointerLock();
    };
    const onMouseMove = (e) => {
      if (document.pointerLockElement !== canvas) return;
      yaw.current -= e.movementX * 0.0022;
      pitch.current -= e.movementY * 0.0022;
      pitch.current = Math.max(-1.2, Math.min(0.9, pitch.current));
    };
    const onWheel = (e) => {
      camDistance.current = Math.max(2, Math.min(12, camDistance.current + e.deltaY * 0.01));
    };
    // Throw the equipped spear, or swing whatever melee weapon is in hand.
    // Shared by the left mouse button and the on-screen attack button.
    const doAttack = () => {
      const s = useGame.getState();
      if (s.activePanel !== null) return;
      const slot = s.hotbarSlots[s.activeHotbarSlot];
      const weapon = WEAPONS[slot];
      if (!weapon || (s.inventory[slot] || 0) <= 0) return;
      attackTimer.current = ATTACK_DURATION;
      if (weapon.throwable) s.throwWeapon(slot);
      else { s.meleeAttack(slot); triggerWeaponFx(slot); }
      mpSend({ t: 'attack' });
    };
    const onMouseDown = (e) => {
      if (e.button !== 0) return;
      if (document.pointerLockElement !== canvas) return;
      doAttack();
    };
    touchInput.attack = doAttack;

    // ---- touch: drag-to-look anywhere on the canvas ----
    const activeLookTouch = { id: null, x: 0, y: 0 };
    const onTouchStart = (e) => {
      if (useGame.getState().activePanel !== null) return;
      if (activeLookTouch.id !== null) return;
      const t = e.changedTouches[0];
      activeLookTouch.id = t.identifier;
      activeLookTouch.x = t.clientX;
      activeLookTouch.y = t.clientY;
    };
    const onTouchMove = (e) => {
      for (const t of e.changedTouches) {
        if (t.identifier === activeLookTouch.id) {
          touchInput.lookDX += t.clientX - activeLookTouch.x;
          touchInput.lookDY += t.clientY - activeLookTouch.y;
          activeLookTouch.x = t.clientX;
          activeLookTouch.y = t.clientY;
        }
      }
    };
    const onTouchEnd = (e) => {
      for (const t of e.changedTouches) {
        if (t.identifier === activeLookTouch.id) activeLookTouch.id = null;
      }
    };

    canvas.addEventListener('click', onClick);
    document.addEventListener('mousemove', onMouseMove);
    canvas.addEventListener('wheel', onWheel, { passive: true });
    canvas.addEventListener('mousedown', onMouseDown);
    canvas.addEventListener('touchstart', onTouchStart, { passive: true });
    canvas.addEventListener('touchmove', onTouchMove, { passive: true });
    canvas.addEventListener('touchend', onTouchEnd, { passive: true });
    canvas.addEventListener('touchcancel', onTouchEnd, { passive: true });

    const offPress = onKeyPress((code) => {
      const s = useGame.getState();

      if (code === 'KeyC') {
        cameraMode.current = cameraMode.current === 'third' ? 'first' : 'third';
      }
      if (code === 'Tab') {
        s.setActivePanel(s.activePanel === 'inventory' ? null : 'inventory');
      }
      if (code === 'Escape' && s.activePanel) {
        s.setActivePanel(null);
      }
      if (code === 'KeyE' || code === 'KeyR') {
        const near = s.nearInteractable;
        if (near && near.key === code) near.onInteract();
      }
      if (code === 'KeyF') {
        const near = s.nearInteractable;
        if (near && near.key === 'KeyF') {
          near.onInteract();
        } else if (inWater.current) {
          s.adjustStat('thirst', 35);
          s.addToast('Drank water (+35 thirst)');
        }
      }
      if (code === 'KeyQ') {
        s.setActiveHotbarSlot((s.activeHotbarSlot + 1) % s.hotbarSlots.length);
      }
      if (code === 'KeyB') {
        s.setActivePanel(s.activePanel === 'build' ? null : 'build');
      }
      if (code === 'KeyM') s.addToast('Full jungle map coming soon');
      if (code === 'KeyT' && !s.activePanel) {
        s.setChatOpen(true);
        if (document.exitPointerLock) document.exitPointerLock();
      }
      // 0 key (main row or numpad): poke/stab with the equipped weapon without throwing it.
      if (code === 'Digit0' || code === 'Numpad0') {
        const slot = s.hotbarSlots[s.activeHotbarSlot];
        const weapon = WEAPONS[slot];
        if (weapon && (s.inventory[slot] || 0) > 0) {
          attackTimer.current = ATTACK_DURATION;
          s.meleeAttack(slot);
          triggerWeaponFx(slot);
          mpSend({ t: 'attack' });
        }
      }
    });

    // Exit pointer lock whenever a panel opens
    const unsub = useGame.subscribe((state, prev) => {
      if (state.activePanel !== prev.activePanel && state.activePanel !== null) {
        if (document.pointerLockElement === canvas) document.exitPointerLock();
      }
    });

    return () => {
      canvas.removeEventListener('click', onClick);
      document.removeEventListener('mousemove', onMouseMove);
      canvas.removeEventListener('wheel', onWheel);
      canvas.removeEventListener('mousedown', onMouseDown);
      canvas.removeEventListener('touchstart', onTouchStart);
      canvas.removeEventListener('touchmove', onTouchMove);
      canvas.removeEventListener('touchend', onTouchEnd);
      canvas.removeEventListener('touchcancel', onTouchEnd);
      offPress();
      unsub();
      touchInput.attack = () => {};
    };
  }, [gl]);

  useFrame((_, rawDelta) => {
    const delta = Math.min(rawDelta, 0.1);
    const s = useGame.getState();
    const panelOpen = s.activePanel !== null;
    const pos = group.current.position;

    // ---- input ----
    let moveX = 0;
    let moveZ = 0;
    if (!panelOpen) {
      if (isKeyDown('KeyW')) moveZ -= 1;
      if (isKeyDown('KeyS')) moveZ += 1;
      if (isKeyDown('KeyA')) moveX -= 1;
      if (isKeyDown('KeyD')) moveX += 1;

      // ---- virtual joystick (touch) ----
      moveX += touchInput.moveX;
      moveZ += touchInput.moveZ;

      // ---- arrow keys: look around (alternative to mouse) ----
      const lookSpeed = 1.6; // radians/sec
      if (isKeyDown('ArrowLeft')) yaw.current += lookSpeed * delta;
      if (isKeyDown('ArrowRight')) yaw.current -= lookSpeed * delta;
      if (isKeyDown('ArrowUp')) pitch.current += lookSpeed * delta;
      if (isKeyDown('ArrowDown')) pitch.current -= lookSpeed * delta;
      pitch.current = Math.max(-1.2, Math.min(0.9, pitch.current));
    }

    // ---- touch drag-to-look ----
    if (touchInput.lookDX !== 0 || touchInput.lookDY !== 0) {
      yaw.current -= touchInput.lookDX * 0.0028;
      pitch.current -= touchInput.lookDY * 0.0028;
      pitch.current = Math.max(-1.2, Math.min(0.9, pitch.current));
      touchInput.lookDX = 0;
      touchInput.lookDY = 0;
    }
    const moving = moveX !== 0 || moveZ !== 0;
    const crouching = !panelOpen && isKeyDown('ControlLeft');
    const sprinting = !panelOpen && !crouching && moving && isKeyDown('ShiftLeft') && s.stats.energy > 1;

    // ---- water check ----
    const dxw = pos.x - POND_CENTER[0];
    const dzw = pos.z - POND_CENTER[1];
    const swimming = Math.hypot(dxw, dzw) < POND_RADIUS;
    inWater.current = swimming;

    // ---- speed / meter multiplier ----
    let speed = WALK_SPEED;
    let meterMult = 1;
    if (crouching) {
      speed *= CROUCH_MULT;
      meterMult = 1;
    } else if (sprinting) {
      speed *= SPRINT_MULT;
      meterMult = 1.5;
    }
    if (swimming) {
      speed *= 0.6;
      meterMult = 2;
    }

    // ---- movement ----
    let moved = 0;
    if (moving) {
      const len = Math.hypot(moveX, moveZ) || 1;
      const fwdInput = -moveZ / len; // W = forward
      const rightInput = moveX / len; // D = right

      const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(UP, yaw.current);
      const right = new THREE.Vector3(1, 0, 0).applyAxisAngle(UP, yaw.current);

      const dirX = forward.x * fwdInput + right.x * rightInput;
      const dirZ = forward.z * fwdInput + right.z * rightInput;
      const dirLen = Math.hypot(dirX, dirZ) || 1;

      const stepX = (dirX / dirLen) * speed * delta;
      const stepZ = (dirZ / dirLen) * speed * delta;
      pos.x += stepX;
      pos.z += stepZ;
      moved = Math.hypot(stepX, stepZ);

      // face movement direction
      group.current.rotation.y = Math.atan2(dirX / dirLen, dirZ / dirLen);

      limbPhase.current += delta * speed * 2.2;
      const swing = Math.sin(limbPhase.current) * (crouching ? 0.3 : 0.6);
      if (leftArm.current) leftArm.current.rotation.x = swing;
      if (rightArm.current) rightArm.current.rotation.x = -swing;
      if (leftLeg.current) leftLeg.current.rotation.x = -swing;
      if (rightLeg.current) rightLeg.current.rotation.x = swing;
    } else {
      const settle = Math.sin(limbPhase.current) * 0.05;
      if (leftArm.current) leftArm.current.rotation.x *= 0.9;
      if (rightArm.current) rightArm.current.rotation.x *= 0.9;
      if (leftLeg.current) leftLeg.current.rotation.x *= 0.9;
      if (rightLeg.current) rightLeg.current.rotation.x *= 0.9;
    }

    if (moved > 0) {
      s.addMeters(moved * meterMult);
    }

    // ---- attack swing animation (overrides walk-cycle arm pose) ----
    if (attackTimer.current > 0) {
      attackTimer.current = Math.max(0, attackTimer.current - delta);
      const progress = 1 - attackTimer.current / ATTACK_DURATION;
      if (rightArm.current) rightArm.current.rotation.x = -Math.sin(progress * Math.PI) * 1.8;
    }

    // ---- first-person weapon view-model: walk bob + poke animation ----
    if (fpWeaponAnim.current) {
      const bobActive = moving && onGround.current && !swimming;
      const bobAmp = sprinting ? 0.09 : 0.05;
      const targetBobX = bobActive ? Math.sin(limbPhase.current) * bobAmp * 0.4 : 0;
      const targetBobY = bobActive ? Math.abs(Math.sin(limbPhase.current)) * bobAmp : 0;

      let pokeOffsetZ = 0;
      let pokeRotX = 0;
      if (attackTimer.current > 0) {
        const progress = 1 - attackTimer.current / ATTACK_DURATION;
        pokeOffsetZ = -Math.sin(progress * Math.PI) * 0.35;
        pokeRotX = -Math.sin(progress * Math.PI) * 0.5;
      }

      const anim = fpWeaponAnim.current;
      anim.position.x += (targetBobX - anim.position.x) * 0.2;
      anim.position.y += (targetBobY - anim.position.y) * 0.2;
      anim.position.z += (pokeOffsetZ - anim.position.z) * 0.5;
      anim.rotation.x += (pokeRotX - anim.rotation.x) * 0.5;
    }

    // ---- crouch height ----
    const targetScaleY = crouching ? 0.72 : 1;
    if (bodyVisual.current) {
      bodyVisual.current.scale.y += (targetScaleY - bodyVisual.current.scale.y) * 0.2;
    }

    // ---- gravity / jump / swim float ----
    if (swimming) {
      velocityY.current = 0;
      pos.y += (-0.3 - pos.y) * 0.1;
      onGround.current = true;
    } else {
      if (isKeyDown('Space') && onGround.current && !panelOpen) {
        velocityY.current = JUMP_SPEED;
        onGround.current = false;
      }
      velocityY.current -= GRAVITY * delta;
      pos.y += velocityY.current * delta;
      const groundY = getTerrainHeight(pos.x, pos.z);
      if (pos.y <= groundY) {
        pos.y = groundY;
        velocityY.current = 0;
        onGround.current = true;
      }
    }

    // ---- camera ----
    const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(UP, yaw.current);
    if (cameraMode.current === 'third') {
      const dist = camDistance.current;
      const camPos = pos.clone();
      camPos.x -= forward.x * dist * Math.cos(pitch.current);
      camPos.z -= forward.z * dist * Math.cos(pitch.current);
      camPos.y += 1.6 + Math.sin(pitch.current) * dist * -1 + dist * 0.5;
      camPos.y = Math.max(camPos.y, getTerrainHeight(camPos.x, camPos.z) + 0.5);
      camera.position.lerp(camPos, 0.25);
      camera.lookAt(pos.x, pos.y + 1.4, pos.z);
      bodyVisual.current && (bodyVisual.current.visible = true);
    } else {
      camera.position.set(pos.x, pos.y + 1.6, pos.z);
      camera.rotation.order = 'YXZ';
      camera.rotation.y = yaw.current;
      camera.rotation.x = pitch.current;
      camera.rotation.z = 0;
      bodyVisual.current && (bodyVisual.current.visible = false);
    }

    // ---- first-person held weapon view-model ----
    if (fpWeapon.current) {
      if (cameraMode.current === 'first' && equippedWeaponId) {
        fpWeapon.current.visible = true;
        fpWeapon.current.quaternion.copy(camera.quaternion);
        const handOffset = new THREE.Vector3(0.35, -0.32, -0.5).applyQuaternion(camera.quaternion);
        fpWeapon.current.position.copy(camera.position).add(handOffset);
      } else {
        fpWeapon.current.visible = false;
      }
    }

    // ---- survival stat ticking ----
    statTimer.current += delta;
    if (sprinting) s.adjustStat('energy', -delta * 6);
    if (statTimer.current > 1) {
      statTimer.current = 0;
      s.adjustStat('hunger', -0.08);
      s.adjustStat('thirst', -0.12);
      if (!sprinting) s.adjustStat('energy', crouching ? 0.5 : 1);
      if (s.stats.hunger <= 0 || s.stats.thirst <= 0) s.adjustStat('health', -1);
      else if (s.stats.health < 100) s.adjustStat('health', 0.2);
      // night drains warmth slowly
      const t = s.timeOfDay;
      if (t < 5 || t > 20) s.adjustStat('warmth', -0.6);
      else s.adjustStat('warmth', 0.4);
    }

    // ---- share transform for building placement ----
    playerTransform.position[0] = pos.x;
    playerTransform.position[1] = pos.y;
    playerTransform.position[2] = pos.z;
    playerTransform.yaw = yaw.current;

    // ---- nearby interactables ----
    const near = findNearest([pos.x, pos.y, pos.z]);
    const nearId = near ? near.id : null;
    if (nearId !== lastNearId.current) {
      lastNearId.current = nearId;
      s.setNearInteractable(near);
    }

    s.tickRespawns();

    // ---- multiplayer: broadcast our transform a few times a second ----
    mpSendTimer.current += delta;
    if (mpSendTimer.current > 0.08) {
      mpSendTimer.current = 0;
      mpSend({
        t: 'state',
        position: [pos.x, pos.y, pos.z],
        yaw: group.current.rotation.y,
        moving,
        sprinting,
        crouching,
        equippedWeaponId,
      });

      // Host: keep the joiner's rival tribe camps in sync (positions, health, captures).
      if (s.mpRole === 'host') {
        mpSend({
          t: 'tribeSync',
          members: tribeMemberSyncData,
          tribeMemberState: s.tribeMemberState,
          capturedTribes: s.capturedTribes,
          activeTribeIds: s.activeTribeIds,
        });
      }
    }
  });

  return html`
    <${Fragment}>
    <group ref=${group} position=${[0, 0, 8]}>
      <group ref=${bodyVisual}>
        <!-- torso -->
        <mesh position=${[0, 1.1, 0]} castShadow=${true}>
          <capsuleGeometry args=${[0.28, 0.6, 4, 8]} />
          <meshStandardMaterial color="#3f6b8a" roughness=${0.7} />
        </mesh>
        <!-- head -->
        <mesh position=${[0, 1.78, 0]} castShadow=${true}>
          <sphereGeometry args=${[0.24, 12, 12]} />
          <meshStandardMaterial color="#d8a878" roughness=${0.8} />
        </mesh>
        <!-- left arm -->
        <group ref=${leftArm} position=${[0.36, 1.35, 0]}>
          <mesh position=${[0, -0.32, 0]} castShadow=${true}>
            <capsuleGeometry args=${[0.08, 0.5, 4, 6]} />
            <meshStandardMaterial color="#d8a878" roughness=${0.8} />
          </mesh>
        </group>
        <!-- right arm -->
        <group ref=${rightArm} position=${[-0.36, 1.35, 0]}>
          <mesh position=${[0, -0.32, 0]} castShadow=${true}>
            <capsuleGeometry args=${[0.08, 0.5, 4, 6]} />
            <meshStandardMaterial color="#d8a878" roughness=${0.8} />
          </mesh>
          ${equippedWeaponId && html`<${HeldWeapon} id=${equippedWeaponId} />`}
        </group>
        <!-- left leg -->
        <group ref=${leftLeg} position=${[0.14, 0.75, 0]}>
          <mesh position=${[0, -0.35, 0]} castShadow=${true}>
            <capsuleGeometry args=${[0.1, 0.55, 4, 6]} />
            <meshStandardMaterial color="#5a4632" roughness=${0.8} />
          </mesh>
        </group>
        <!-- right leg -->
        <group ref=${rightLeg} position=${[-0.14, 0.75, 0]}>
          <mesh position=${[0, -0.35, 0]} castShadow=${true}>
            <capsuleGeometry args=${[0.1, 0.55, 4, 6]} />
            <meshStandardMaterial color="#5a4632" roughness=${0.8} />
          </mesh>
        </group>
      </group>
    </group>
    <group ref=${fpWeapon} visible=${false}>
      <group ref=${fpWeaponAnim}>
        <group rotation=${[0, Math.PI, 0]}>
          ${equippedWeaponId && html`<${HeldWeapon} id=${equippedWeaponId} />`}
        </group>
      </group>
    </group>
    <//>
  `;
}

// ============================================================
// RemotePlayer.js - visual representation of the other player (P2P multiplayer)
// ============================================================
function RemotePlayer() {
  const group = useRef();
  const leftArm = useRef();
  const rightArm = useRef();
  const leftLeg = useRef();
  const rightLeg = useRef();
  const limbPhase = useRef(0);
  const attackTimer = useRef(0);
  const lastAttackSeq = useRef(0);
  const [visible, setVisible] = useState(false);
  const [weaponId, setWeaponId] = useState(null);

  useFrame((_, rawDelta) => {
    const delta = Math.min(rawDelta, 0.1);
    if (!remotePlayer.active) {
      if (visible) setVisible(false);
      return;
    }
    if (!visible) setVisible(true);
    if (remotePlayer.equippedWeaponId !== weaponId) setWeaponId(remotePlayer.equippedWeaponId);

    const g = group.current;
    const [tx, ty, tz] = remotePlayer.position;
    g.position.x += (tx - g.position.x) * 0.25;
    g.position.y += (ty - g.position.y) * 0.25;
    g.position.z += (tz - g.position.z) * 0.25;

    let yawDiff = remotePlayer.yaw - g.rotation.y;
    while (yawDiff > Math.PI) yawDiff -= Math.PI * 2;
    while (yawDiff < -Math.PI) yawDiff += Math.PI * 2;
    g.rotation.y += yawDiff * 0.25;

    if (remotePlayer.attackSeq !== lastAttackSeq.current) {
      lastAttackSeq.current = remotePlayer.attackSeq;
      attackTimer.current = ATTACK_DURATION;
    }

    if (remotePlayer.moving) {
      const speedFactor = remotePlayer.sprinting ? 2.2 : remotePlayer.crouching ? 1.0 : 1.6;
      limbPhase.current += delta * speedFactor * 2.2;
      const swing = Math.sin(limbPhase.current) * (remotePlayer.crouching ? 0.3 : 0.6);
      if (leftArm.current) leftArm.current.rotation.x = swing;
      if (rightArm.current) rightArm.current.rotation.x = -swing;
      if (leftLeg.current) leftLeg.current.rotation.x = -swing;
      if (rightLeg.current) rightLeg.current.rotation.x = swing;
    } else {
      if (leftArm.current) leftArm.current.rotation.x *= 0.9;
      if (rightArm.current) rightArm.current.rotation.x *= 0.9;
      if (leftLeg.current) leftLeg.current.rotation.x *= 0.9;
      if (rightLeg.current) rightLeg.current.rotation.x *= 0.9;
    }

    if (attackTimer.current > 0) {
      attackTimer.current -= delta;
      const progress = 1 - attackTimer.current / ATTACK_DURATION;
      if (rightArm.current) rightArm.current.rotation.x = -Math.sin(progress * Math.PI) * 1.8;
    }
  });

function ResourceNode({ node }) {
  const depleted = useGame((s) => !!s.depletedNodes[node.id]);
  const activeWeapon = useGame((s) => s.hotbarSlots[s.activeHotbarSlot]);
  const hasMachete = useGame((s) => (s.inventory.machete || 0) > 0);
  const choppingLeaves = node.type === 'wood' && activeWeapon === 'machete' && hasMachete;

  useEffect(() => {
    if (depleted) return undefined;
    return registerInteractable({
      id: node.id,
      position: node.position,
      radius: 2.4,
      key: 'KeyF',

// ---------- A spear in flight, arcing from the player's hand to where it lands ----------
function FlyingSpear({ spear }) {
  const group = useRef();
  const landed = useRef(false);
  const duration = useRef(Math.max(0.15, Math.hypot(spear.end[0] - spear.start[0], spear.end[2] - spear.start[2]) / SPEAR_FLIGHT_SPEED));
  const yaw = Math.atan2(spear.end[0] - spear.start[0], spear.end[2] - spear.start[2]);

  useFrame(() => {
    if (landed.current || !group.current) return;
    const t = Math.min(1, (Date.now() - spear.startedAt) / 1000 / duration.current);
    const x = spear.start[0] + (spear.end[0] - spear.start[0]) * t;
    const z = spear.start[2] + (spear.end[2] - spear.start[2]) * t;
    const arcY = spear.start[1] + (spear.end[1] - spear.start[1]) * t + Math.sin(t * Math.PI) * 1.2;
    const terrY = getTerrainHeight(x, z);
    group.current.position.set(x, Math.max(arcY, terrY + 0.05), z);
    if (t >= 1 || (arcY < terrY + 0.1 && t > 0.05)) {
      landed.current = true;
      useGame.getState().landSpear(spear.id, [x, terrY + 0.05, z]);
    }
  });

  return html`
    <group ref=${group} position=${spear.start} rotation=${[1.5, yaw, 0]}>
      <${HeldWeapon} id=${spear.weaponId} />
    </group>
  `;
}

  const flyingSpears = useGame((s) => s.flyingSpears);
  return html`

    <//>
  `;
}

// ---------- Quick visual "ching" spark burst, e.g. when swinging the machete ----------
function ChingFx({ fx }) {
  const group = useRef();
  const t = useRef(0);
  const DURATION = 0.25;

  useFrame((_, rawDelta) => {
    const delta = Math.min(rawDelta, 0.1);
    t.current += delta;
    if (t.current >= DURATION) {
      useGame.getState().removeFx(fx.id);
      return;
    }
    const k = t.current / DURATION;
    if (group.current) {
      const scale = 0.4 + k * 1.4;
      group.current.scale.set(scale, scale, scale);
      for (const child of group.current.children) {
        if (child.material) child.material.opacity = 1 - k;
      }
    }
  });

  return html`
    <group ref=${group} position=${fx.position}>
      ${[0, 1, 2, 3].map((i) => html`
        <mesh key=${i} rotation=${[0, 0, (i / 4) * Math.PI * 2]}>
          <planeGeometry args=${[0.6, 0.06]} />
          <meshBasicMaterial color="#fff7c0" transparent=${true} opacity=${1} side=${THREE.DoubleSide} depthWrite=${false} />
        </mesh>
      `)}
    </group>
  `;
}

  const fxEvents = useGame((s) => s.fxEvents);
  return html`

      ${fxEvents.map((fx) => fx.type === 'ching' ? html`<${ChingFx} key=${fx.id} fx=${fx} />` : null)}

  `;
}
